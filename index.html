<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wortsalat Game</title>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts: Titan One for titles, Nunito for text -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Titan+One&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --clr-ww-blue: #3b82f6;
      --clr-ww-darkblue: #1e3a8a;
      --clr-ww-yellow: #fcd34d;
      --clr-ww-red: #ef4444;
      --clr-ww-white: #ffffff;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--clr-ww-blue);
      color: #1e293b;
      min-height: 100vh;
      overflow-x: hidden;
      margin: 0;
    }

    .font-title {
      font-family: 'Titan One', cursive;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Wordwall Backgrounds */
    .bg-sunburst {
      background-color: var(--clr-ww-blue);
      background-image: repeating-conic-gradient(var(--clr-ww-darkblue) 0 15deg,
          transparent 15deg 30deg);
      background-position: center center;
    }

    .bg-blob {
      background-color: var(--clr-ww-blue);
      position: relative;
    }

    .bg-blob::before,
    .bg-blob::after {
      content: "";
      position: absolute;
      width: 150vw;
      height: 150vw;
      background: rgba(30, 58, 138, 0.2);
      border-radius: 40%;
      z-index: -1;
      animation: rotateBlob 40s linear infinite;
    }

    .bg-blob::before {
      top: -100vw;
      left: -50vw;
    }

    .bg-blob::after {
      bottom: -100vw;
      right: -50vw;
      animation-direction: reverse;
    }

    @keyframes rotateBlob {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes driftRight {
      0% { transform: translateX(-300px); }
      100% { transform: translateX(calc(100vw + 300px)); }
    }
    .animate-drift {
      animation: driftRight linear infinite;
    }

    /* Breathe Animation for Titles */
    .animate-breathe {
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1) translateY(0);
      }

      50% {
        transform: scale(1.05) translateY(-5px);
      }
    }

    /* Floating Decor Animation */
    .float-decor {
      position: absolute;
      animation: floatItem 6s ease-in-out infinite;
      color: rgba(252, 211, 77, 0.6);
      /* Yellow with opacity */
      z-index: 0;
    }

    @keyframes floatItem {

      0%,
      100% {
        transform: translateY(0) rotate(-5deg);
      }

      50% {
        transform: translateY(-20px) rotate(5deg);
      }
    }

    /* Text Outline (Stroke) Hack */
    .text-stroke-thick {
      -webkit-text-stroke: 8px var(--clr-ww-darkblue);
      paint-order: stroke fill;
      filter: drop-shadow(0px 8px 0px rgba(0, 0, 0, 0.3));
    }

    /* Fallback for browsers that don't support paint-order well */
    .text-shadow-thick {
      text-shadow:
        -4px -4px 0 var(--clr-ww-darkblue),
        0 -4px 0 var(--clr-ww-darkblue),
        4px -4px 0 var(--clr-ww-darkblue),
        4px 0 0 var(--clr-ww-darkblue),
        4px 4px 0 var(--clr-ww-darkblue),
        0 4px 0 var(--clr-ww-darkblue),
        -4px 4px 0 var(--clr-ww-darkblue),
        -4px 0 0 var(--clr-ww-darkblue),
        0 8px 0 rgba(0, 0, 0, 0.3);
    }

    /* Wordwall Card Container */
    .card-ww {
      background: var(--clr-ww-blue);
      border: 6px solid var(--clr-ww-white);
      border-radius: 30px;
      box-shadow: 0 0 0 6px var(--clr-ww-darkblue), 0 15px 30px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 10;
      /* Inner blob pattern for cards */
      background-image: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 40%);
    }

    /* Pill Buttons */
    .btn-ww {
      background: var(--clr-ww-blue);
      color: var(--clr-ww-white);
      border: 4px solid var(--clr-ww-white);
      border-radius: 9999px;
      box-shadow: 0 0 0 4px var(--clr-ww-darkblue), 0 8px 0 4px var(--clr-ww-darkblue);
      font-family: 'Titan One', cursive;
      text-transform: uppercase;
      transition: all 0.1s ease;
      position: relative;
      letter-spacing: 1px;
    }

    .btn-ww:active:not(:disabled) {
      transform: translateY(6px);
      box-shadow: 0 0 0 4px var(--clr-ww-darkblue), 0 2px 0 4px var(--clr-ww-darkblue);
    }

    .btn-ww.red {
      background: var(--clr-ww-red);
    }

    /* Next/Right Nav Button */
    .btn-nav-round {
      background: var(--clr-ww-blue);
      color: var(--clr-ww-white);
      border: 4px solid var(--clr-ww-white);
      border-radius: 50%;
      box-shadow: 0 0 0 4px var(--clr-ww-darkblue), 0 6px 0 4px var(--clr-ww-darkblue);
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      transition: all 0.1s ease;
      cursor: pointer;
    }

    .btn-nav-round:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 4px var(--clr-ww-darkblue), 0 2px 0 4px var(--clr-ww-darkblue);
    }

    .btn-nav-corner {
      bottom: -10px;
      right: -10px;
    }

    /* Inner text boxes (like instructions/profile) */
    .inner-box {
      background: rgba(0, 0, 0, 0.2);
      border: 3px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      color: white;
    }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 4px;
    }

    /* Hide scrollbar for custom elements */
    .custom-scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .custom-scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Screen Transitions */
    .slide-up-fade {
      animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* =============================================
       RESPONSIVE LAYOUT SYSTEM
       ============================================= */

    /* App Container — prevents ultra-wide stretching */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
    }

    /* ---- FLUID TYPOGRAPHY ---- */
    .text-fluid-xs   { font-size: clamp(0.75rem,  1.8vw, 0.875rem); }
    .text-fluid-sm   { font-size: clamp(0.875rem, 2.2vw, 1rem);     }
    .text-fluid-base { font-size: clamp(0.9rem,   2.5vw, 1.1rem);   }
    .text-fluid-lg   { font-size: clamp(1rem,     2.8vw, 1.25rem);  }

    /* ---- TOUCH TARGET (WCAG 2.5.5 — min 44×44px) ---- */
    .touch-target {
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- DIALOG BOTTOM SHEET ---- */
    /* Mobile-first: full-width bottom sheet */
    .dialog-sheet-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .dialog-sheet-inner {
      width: 100%;
      pointer-events: auto;
    }

    /* Tablet ≥ 640px: limit width, round top corners */
    /* overflow: visible agar speech bubble & portrait tidak terpotong */
    @media (min-width: 640px) {
      .dialog-sheet-inner {
        max-width: 680px;
        overflow: visible;
      }
    }

    /* Desktop ≥ 1024px: wider panel */
    @media (min-width: 1024px) {
      .dialog-sheet-inner {
        max-width: 900px;
      }
    }

    /* Dialog panel */
    .dialog-panel {
      background-color: var(--clr-ww-darkblue);
      border-top: 5px solid white;
      width: 100%;
      box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: row;
      align-items: stretch;
      padding-top: 8px;
      padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
      min-height: clamp(120px, 28vw, 170px);
      position: relative;
    }

    @media (min-width: 640px) {
      .dialog-panel {
        border: 5px solid white;
        border-bottom: none;
        border-radius: 24px 24px 0 0;
        padding-top: 14px;
        padding-bottom: 18px;
      }
    }

    /* Portrait wrap — responsive width slot */
    .dialog-portrait-wrap {
      width: clamp(78px, 24vw, 158px);
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }

    /* Portrait image — scales without distortion */
    .dialog-portrait-img {
      position: absolute;
      bottom: 0;
      left: 0;
      width: clamp(98px, 31vw, 215px);
      height: auto;
      max-height: clamp(165px, 46vw, 310px);
      object-fit: contain;
      object-position: bottom;
      max-width: none;
      filter: drop-shadow(5px 5px 12px rgba(0, 0, 0, 0.5));
    }

    /* Content area right of portrait */
    .dialog-content-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      /* top: lebih besar agar avatar/nama tidak tertutup bubble */
      /* left: geser teks kanan agar tidak dempet ke foto Alanna */
      /* right: ruang untuk tombol X */
      padding: clamp(16px, 4vw, 22px)
               clamp(52px, 13vw, 92px)
               clamp(8px, 2vw, 14px)
               clamp(28px, 7vw, 68px);
    }

    /* Scrollable text inside dialog (prevents height blow-up) */
    .dialog-text-area {
      overflow-y: auto;
      max-height: clamp(80px, 25vw, 155px);
      line-height: 1.6;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
    }

    .dialog-text-area::-webkit-scrollbar { width: 5px; }
    .dialog-text-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
    }

    /* Speech bubble — ramping/sempit, tidak menutupi avatar di atas */
    .speech-bubble-anchor {
      position: absolute;
      top: clamp(-38px, -10vw, -52px);
      left: clamp(80px, 24vw, 180px);
      z-index: 30;
    }

    .speech-bubble-label {
      position: relative;
      background-color: var(--clr-ww-yellow);
      color: var(--clr-ww-darkblue);
      font-family: 'Titan One', cursive;
      padding: 2px clamp(8px, 2vw, 16px);
      border-radius: 8px;
      font-size: clamp(0.58rem, 2.1vw, 0.84rem);
      border: 2px solid white;
      z-index: 20;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Developer profile text scroll */
    .devprofile-text-scroll {
      overflow-y: auto;
      max-height: clamp(140px, 38vh, 300px);
      line-height: 1.6;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
    }

    .devprofile-text-scroll::-webkit-scrollbar { width: 5px; }
    .devprofile-text-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
    }

    /* ---- DIALOG BACKDROP — blur + gradient overlay saat dialog muncul ---- */
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      z-index: 48;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(14, 36, 100, 0.08) 40%,
        rgba(14, 36, 100, 0.35) 75%,
        rgba(14, 36, 100, 0.55) 100%
      );
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,0,0,0.15) 35%,
        rgba(0,0,0,0.6) 65%,
        black 88%
      );
      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,0,0,0.15) 35%,
        rgba(0,0,0,0.6) 65%,
        black 88%
      );
      animation: slideUpFadeOuter 0.4s ease forwards;
    }

    /* ---- OUTER SCREEN FADE (opacity only — NO transform) ----
       Penting: animasi dengan transform menciptakan stacking context baru
       sehingga position:fixed di dalamnya tidak bisa keluar ke viewport.
       Gunakan class ini untuk wrapper screen yang mengandung dialog fixed. */
    .slide-up-fade-outer {
      animation: slideUpFadeOuter 0.45s ease forwards;
    }
    @keyframes slideUpFadeOuter {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    /* ---- FLYING BIRDS — sayap kiri/kanan berotasi natural ---- */
    @keyframes birdWingL {
      0%   { transform: rotate(-28deg); }
      100% { transform: rotate(18deg); }
    }
    @keyframes birdWingR {
      0%   { transform: rotate(28deg); }
      100% { transform: rotate(-18deg); }
    }

    /* ---- SPLASH TRANSITION ---- */
    /* 1. Tombol mengecil dan hilang */
    @keyframes btnExit {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    .btn-exiting {
      animation: btnExit 0.35s cubic-bezier(0.4,0,1,1) forwards;
      pointer-events: none;
    }

    /* 2. Judul membesar ke tengah dengan glow */
    @keyframes titleFocus {
      0%   { transform: scale(1);   filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
      30%  { transform: scale(1.25); filter: drop-shadow(0 0 18px rgba(255,255,255,0.55)); }
      70%  { transform: scale(1.55); filter: drop-shadow(0 0 35px rgba(255,255,255,0.75)) drop-shadow(0 0 70px rgba(252,211,77,0.5)); }
      85%  { transform: scale(1.6);  filter: drop-shadow(0 0 45px rgba(255,255,255,0.9)) drop-shadow(0 0 90px rgba(252,211,77,0.65)); }
      100% { transform: scale(1.6);  filter: drop-shadow(0 0 45px rgba(255,255,255,0.9)) drop-shadow(0 0 90px rgba(252,211,77,0.65)); }
    }
    .title-focused {
      animation: titleFocus 0.9s cubic-bezier(0.2,0,0.3,1) forwards;
      position: relative; z-index: 12;
    }

    /* 3. Fade to black overlay */
    @keyframes fadeToBlack {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    .splash-fade-black {
      position: fixed; inset: 0;
      background: black;
      z-index: 100;
      pointer-events: none;
      animation: fadeToBlack 0.75s ease-in forwards;
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wwBlue: '#3b82f6',
            wwDarkBlue: '#1e3a8a',
            wwYellow: '#fcd34d',
            wwRed: '#ef4444',
            wwWhite: '#ffffff',
          }
        }
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>

  <!-- Global Audio Elements -->
  <audio id="bgm" src="assets/music/game_background 1.mp3" loop></audio>
  <audio id="bgm-2" src="assets/music/game_background 2.mp3" loop></audio>
  <audio id="sfx-click" src="assets/music/click 1.mp3"></audio>
  <audio id="sfx-timer" src="assets/music/timer.mp3"></audio>
  <audio id="sfx-correct" src="assets/music/correct answer.mp3"></audio>
  <audio id="sfx-wrong" src="assets/music/wrong answer.mp3"></audio>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Audio Helpers
    const playClick = () => {
      const sfx = document.getElementById('sfx-click');
      if (sfx) {
        sfx.currentTime = 0;
        sfx.play().catch(e => console.log('Audio play blocked:', e));
      }
    };

    const playTimerTick = () => {
      const sfx = document.getElementById('sfx-timer');
      if (sfx) { sfx.volume = 0.3; sfx.play().catch(e => e); }
    };

    const playCorrect = () => {
      const sfx = document.getElementById('sfx-correct');
      if (sfx) { sfx.currentTime = 0; sfx.volume = 0.4; sfx.play().catch(e => e); }
    };

    const playWrong = () => {
      const sfx = document.getElementById('sfx-wrong');
      if (sfx) { sfx.currentTime = 0; sfx.volume = 0.4; sfx.play().catch(e => e); }
    };

    const startBGM = (mode = 'menu') => {
      const bgm1 = document.getElementById('bgm');
      const bgm2 = document.getElementById('bgm-2');

      if (mode === 'game') {
        if (bgm1) bgm1.pause();
        if (bgm2) {
          bgm2.volume = 0.15;
          bgm2.play().catch(e => console.log('BGM2 blocked:', e));
        }
      } else {
        if (bgm2) bgm2.pause();
        if (bgm1) {
          bgm1.volume = 0.15;
          bgm1.play().catch(e => console.log('BGM1 blocked:', e));
        }
      }
    };

    // --- Web Speech API TTS Hook ---
    function useGermanVoice() {
      const [isSpeaking, setIsSpeaking] = useState(false);

      const speak = (text) => {
        if (!('speechSynthesis' in window)) return;
        
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'de-DE';
        utterance.rate = 0.85;
        utterance.pitch = 1.1;
        
        const voices = window.speechSynthesis.getVoices();
        const preferredNames = ['Google Deutsch', 'Microsoft Katja', 'Marlene', 'Anna'];
        
        let selectedVoice = null;
        for (const name of preferredNames) {
          selectedVoice = voices.find(v => v.name.includes(name) && v.lang.startsWith('de'));
          if (selectedVoice) break;
        }
        
        if (!selectedVoice) {
          selectedVoice = voices.find(v => v.lang.startsWith('de'));
        }
        
        if (selectedVoice) {
          utterance.voice = selectedVoice;
        }
        
        utterance.onstart = () => setIsSpeaking(true);
        utterance.onend = () => setIsSpeaking(false);
        utterance.onerror = () => setIsSpeaking(false);
        
        window.speechSynthesis.speak(utterance);
      };

      return { speak, isSpeaking };
    }

    // --- REUSABLE COMPONENTS ---

    // Icon Component using Lucide (Safe for React)
    function Icon({ name, size = 24, className = "" }) {
      const spanRef = useRef(null);

      useEffect(() => {
        if (window.lucide && spanRef.current) {
          spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          window.lucide.createIcons({
            attrs: { class: className, width: size, height: size },
            nameAttr: 'data-lucide',
            root: spanRef.current
          });
        }
      }, [name, className, size]);

      return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}"></i>` }} />;
    }

    // Wordwall Title Component
    function TitleText({ text1, text2, className = "" }) {
      return (
        <div className={`font-title text-center ${className}`}>
          {text1 && <h1 className="text-4xl sm:text-6xl text-white text-shadow-thick mb-2">{text1}</h1>}
          {text2 && <h1 className="text-5xl sm:text-7xl text-wwYellow text-shadow-thick">{text2}</h1>}
        </div>
      );
    }

    // Floating Background Decor
    function BackgroundDecor() {
      // Theme: Family / Home. Increased sizes.
      const items = [
        { icon: 'home', top: '5%', left: '8%', delay: '0s', size: 90 },
        { icon: 'armchair', top: '15%', right: '10%', delay: '1s', size: 80 },
        { icon: 'heart', top: '55%', left: '15%', delay: '2s', size: 70 },
        { icon: 'camera', bottom: '15%', right: '20%', delay: '0.5s', size: 85 },
        { icon: 'coffee', top: '65%', right: '8%', delay: '3s', size: 75 },
        { icon: 'utensils', bottom: '10%', left: '10%', delay: '1.5s', size: 90 },
      ];

      return (
        <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
          {items.map((item, i) => (
            <div
              key={i}
              className="float-decor drop-shadow-md"
              style={{ top: item.top, bottom: item.bottom, left: item.left, right: item.right, animationDelay: item.delay }}
            >
              <Icon name={item.icon} size={item.size} />
            </div>
          ))}
        </div>
      );
    }


    // --- LERNEN MODULE ---
    function LernenScreen({ onBack, onNavigate }) {
      const [tab, setTab] = useState(1);

      return (
        <div className="flex flex-col items-center min-h-screen p-4 sm:p-6 slide-up-fade-outer justify-center w-full relative">
          <BackgroundDecor />
          <div className="card-ww w-full max-w-4xl p-6 sm:p-8 mb-6 relative">
            <button onClick={() => { playClick(); onBack(); }} className="absolute top-4 right-4 bg-wwRed text-white rounded-full p-2 border-2 border-white shadow-[0_0_0_2px_#1e3a8a] z-20 hover:scale-105 active:scale-95 transition-transform">
              <Icon name="x" size={24} className="stroke-[3]" />
            </button>

            <div className="flex items-center justify-center mb-8">
              <h2 className="text-3xl sm:text-4xl font-title text-white text-shadow-thick">LERNEN</h2>
            </div>

            <div className="flex gap-4 mb-8 overflow-x-auto pb-4 px-2 sm:justify-center w-full max-w-full custom-scrollbar-hide snap-x">
              <button onClick={() => { playClick(); setTab(1); }} className={`flex-shrink-0 snap-center btn-ww px-6 py-3 text-sm sm:text-lg ${tab === 1 ? 'red' : ''}`}>
                Stammbaum
              </button>

    function FlashCard({ word }) {
      const [flipped, setFlipped] = useState(false);
      const { speak, isSpeaking } = useGermanVoice();

      const getGroupStyles = (group) => {
        switch (group) {
          case 'maskulin': return { border: 'border-wwBlue', text: 'text-wwBlue' };
          case 'feminin': return { border: 'border-wwRed', text: 'text-wwRed' };
          case 'neutral': return { border: 'border-wwYellow', text: 'text-wwYellow' };
          case 'plural': return { border: 'border-green-500', text: 'text-green-500' };
          default: return { border: 'border-gray-400', text: 'text-gray-400' };
        }
      };

      const getExplanation = (group) => {
        switch (group) {
          case 'maskulin': return 'Maskulin (der) ➔ mein';
          case 'feminin': return 'Feminin (die) ➔ meine';
          case 'neutral': return 'Netral (das) ➔ mein';
          case 'plural': return 'Jamak (die) ➔ meine';
          default: return '';
        }
      };

      const styles = getGroupStyles(word.group);

      const handleFlip = () => {
        playClick();
        setFlipped(!flipped);
        speak(`${word.article} ${word.noun.split(' / ')[0]}`);
      };

      return (
        <div className={`relative h-28 sm:h-32 cursor-pointer transition-all duration-300 transform-style-3d active:scale-[1.15] active:rotate-[20deg] ${flipped ? 'rotate-y-180' : ''}`} onClick={handleFlip}>
          {/* Front */}
          <div className={`absolute inset-0 backface-hidden bg-white border-4 ${styles.border} rounded-2xl flex items-center justify-center p-2 shadow-lg ${flipped ? 'hidden' : ''}`}>
            <div className={`absolute top-2 right-2 transition-opacity ${isSpeaking ? 'animate-pulse text-wwRed opacity-100' : 'text-gray-400 opacity-50'}`}>
              <Icon name="volume-2" size={16} />
            </div>
            <span className="font-title text-[clamp(0.85rem,3.5vw,1.25rem)] sm:text-[clamp(1rem,2vw,1.5rem)] text-center leading-tight break-words">
              <span className={styles.text}>{word.article}</span> <br className="sm:hidden" /> <span className="text-wwDarkBlue">{word.noun}</span>
            </span>
          </div>
          {/* Back */}
          <div className={`absolute inset-0 backface-hidden bg-white border-4 ${styles.border} rounded-2xl flex flex-col items-center justify-center p-2 shadow-lg rotate-y-180 ${!flipped ? 'hidden' : ''}`}>
            <span className="font-title text-[clamp(0.85rem,4vw,1.25rem)] sm:text-[clamp(1rem,2vw,1.5rem)] text-wwDarkBlue text-center leading-tight break-words px-1">{word.id}</span>
            <span className="text-[9px] sm:text-[11px] font-bold text-wwDarkBlue text-center mt-1 px-1 sm:px-2 py-1 bg-gray-100 border border-gray-200 rounded-lg max-w-full overflow-hidden text-ellipsis whitespace-nowrap">{getExplanation(word.group)}</span>
          </div>
        </div>
      );
    }

    function MiniUbung({ onNavigate }) {
      const questions = [
        { text: "Das ist", blank: "Vater.", answer: "der", options: ["der", "die", "das"] },
        { text: "Das ist", blank: "Mutter.", answer: "die", options: ["der", "die", "das"] },
        { text: "Das ist", blank: "Kind.", answer: "das", options: ["der", "die", "das"] },
      ];
      const [answers, setAnswers] = useState({});

      const isAllCorrect = questions.every((q, i) => answers[i] === q.answer);

      return (
        <div className="slide-up-fade space-y-4 max-w-lg mx-auto pb-6">
          {questions.map((q, i) => {
            const isCorrect = answers[i] === q.answer;
            return (
              <div key={i} className="bg-white/10 p-4 rounded-xl border-2 border-white/30">
                <div className="text-xl font-bold text-center text-white mb-4">
                  {q.text} <span className="text-wwYellow underline px-2">{answers[i] || '___'}</span> {q.blank}
                </div>
                <div className="flex justify-center gap-4">
                  {q.options.map(opt => (
                    <button key={opt} onClick={() => { playClick(); setAnswers({ ...answers, [i]: opt }); }} className={`btn-ww px-6 py-2 text-sm ${answers[i] === opt ? 'red' : ''}`}>
                      {opt}
                    </button>
                  ))}
                </div>
                {answers[i] && (
                  <div className={`text-center mt-3 font-bold ${isCorrect ? 'text-green-400' : 'text-wwRed'}`}>
                    {isCorrect ? 'Benar!' : 'Salah!'}
                  </div>
                )}
              </div>
            );
          })}

          {isAllCorrect && (
            <div className="flex justify-center mt-8 slide-up-fade">
              <button onClick={() => { playClick(); onNavigate('login'); }} className="btn-ww red px-8 py-4 text-xl flex items-center gap-3">
                <Icon name="gamepad-2" size={24} /> BERMAIN WORTSALAT
              </button>
            </div>
          )}
        </div>
      );
    }

    function WortsalatScreen({ level, onFinish, onBack }) {
      const [questions, setQuestions] = useState([]);
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [score, setScore] = useState(0); // number of correct answers
      const [shuffledLetters, setShuffledLetters] = useState([]);
      const [placedLetters, setPlacedLetters] = useState([]);
      const [timeLeft, setTimeLeft] = useState(45);
      const [mistakes, setMistakes] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [timerActive, setTimerActive] = useState(false);
      const { speak } = useGermanVoice();

      useEffect(() => {
        let qList = [...wordBank].sort(() => 0.5 - Math.random());
        const prepared = qList.map(w => {
          let target = ""; let clue = ""; let clueType = "";
          if (level === 1) {
            target = w.noun; clue = w.img; clueType = "image";
          } else if (level === 2) {
            target = w.noun; clue = w.clue; clueType = "text";
          } else if (level === 3) {
            target = w.article + " " + w.noun;
            clue = Math.random() > 0.5 ? w.img : w.clue;
            clueType = clue === w.img ? "image" : "text";
          }
          return { ...w, target, clue, clueType };
        });
        setQuestions(prepared);
      }, [level]);

      useEffect(() => {
        if (questions.length > 0 && currentQIndex < questions.length) {
          const q = questions[currentQIndex];
          const targetStr = q.target.replace(/ /g, '');
          const shuffled = targetStr.split('').sort(() => 0.5 - Math.random()).map((char, i) => ({ id: `char_${currentQIndex}_${i}`, char }));
          setShuffledLetters(shuffled);
          setPlacedLetters(Array(q.target.length).fill(null));
          setTimeLeft(45);
          setMistakes(0);
          setFeedback(null);
          setTimerActive(true);
        } else if (questions.length > 0 && currentQIndex >= questions.length) {
          onFinish(score, questions.length);
        }
      }, [currentQIndex, questions]);

      useEffect(() => {
        if (!timerActive) return;
        if (timeLeft <= 0) {
          setTimerActive(false);
          playWrong();
          setFeedback({ text: "Waktu Habis!", type: 'error' });
          setTimeout(() => setCurrentQIndex(i => i + 1), 1500);
          return;
        }
        if (timeLeft === 10) {
          playTimerTick();
        }
        const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
        return () => clearInterval(timer);
      }, [timeLeft, timerActive]);

      const handleHint = () => {
        playClick();
        const q = questions[currentQIndex];
        const emptyIdx = placedLetters.findIndex((pl, i) => pl === null && q.target[i] !== ' ');
        if (emptyIdx !== -1) {
          const correctChar = q.target[emptyIdx];
          const letterInShuffleIndex = shuffledLetters.findIndex(l => l.char === correctChar);
          if (letterInShuffleIndex !== -1) {
            const letterObj = shuffledLetters[letterInShuffleIndex];
            handleLetterClick(letterObj, true);
          }
        }
      };

      const handleLetterClick = (letterObj, isHint = false) => {
        if (!timerActive) return;
        if (!isHint) playClick();

        const q = questions[currentQIndex];
        const emptyIdx = placedLetters.findIndex((pl, i) => pl === null && q.target[i] !== ' ');

        if (emptyIdx !== -1) {
          const expectedChar = q.target[emptyIdx];

          if (letterObj.char === expectedChar) {
            const newPlaced = [...placedLetters];
            newPlaced[emptyIdx] = { ...letterObj, status: 'correct' };
            setPlacedLetters(newPlaced);
            setShuffledLetters(s => s.filter(sl => sl.id !== letterObj.id));

            const totalChars = q.target.replace(/ /g, '').length;
            if (newPlaced.filter(p => p !== null).length === totalChars) {
              setTimerActive(false);
              setScore(s => s + 1);
              playCorrect();
              setFeedback({ text: ["Prima!", "Richtig!", "Gut gemacht!"][Math.floor(Math.random() * 3)], type: 'success' });
              setTimeout(() => speak(`${q.article} ${q.noun.split(' / ')[0]}`), 300);
              setTimeout(() => setCurrentQIndex(i => i + 1), 2000);
            }
          } else {
            setMistakes(m => m + 1);
            playWrong();
            setFeedback({ text: "Ups, versuch es nochmal!", type: 'error' });

            const newPlaced = [...placedLetters];
            newPlaced[emptyIdx] = { ...letterObj, status: 'wrong' };
            setPlacedLetters(newPlaced);
            setShuffledLetters(s => s.filter(sl => sl.id !== letterObj.id));

            setTimeout(() => {
              if (timerActive) {
                const revertedPlaced = [...newPlaced];
                revertedPlaced[emptyIdx] = null;
                setPlacedLetters(revertedPlaced);
                setShuffledLetters(s => [...s, letterObj]);
                setFeedback(null);
              }
            }, 500);
          }
        }
      };

      if (questions.length === 0 || currentQIndex >= questions.length) return null;
      const q = questions[currentQIndex];

      return (
        <div className="flex flex-col items-center min-h-screen p-4 justify-center w-full relative">
          <BackgroundDecor />
          <div className="card-ww w-full max-w-2xl p-6 sm:p-10 relative z-10">
            <button onClick={() => { playClick(); onBack(); }} className="absolute top-4 right-4 bg-wwRed text-white rounded-full p-2 border-2 border-white shadow-[0_0_0_2px_#1e3a8a] z-20 hover:scale-105 active:scale-95 transition-transform">
              <Icon name="x" size={24} />
            </button>

            <TitleText text1="WORTSALAT" className="mb-2 scale-75 sm:scale-100" />
            <div className="text-center font-title text-white mb-6 bg-black/20 rounded-full px-4 py-1 mx-auto w-max border-2 border-white/40">
              Tahap {level} • Soal {currentQIndex + 1}/20
            </div>

            <div className="flex justify-between text-white font-title text-lg sm:text-xl mb-6 bg-wwDarkBlue px-6 py-2 rounded-full border-2 border-white">
              <span className={timeLeft <= 10 ? "text-wwRed animate-pulse" : ""}>Time: {timeLeft}s</span>
              <span className="text-wwYellow">Score: {score}</span>
            </div>

            <div className="inner-box p-6 flex flex-col items-center mb-6 min-h-[250px] justify-center relative">
              {/* Feedback Overlay */}
              {feedback && (
                <div className={`absolute top-2 left-1/2 -translate-x-1/2 z-30 font-title text-xl sm:text-2xl px-6 py-2 rounded-full border-4 border-white shadow-xl animate-breathe ${feedback.type === 'success' ? 'bg-green-500 text-white' : 'bg-wwRed text-white'}`}>
                  {feedback.text}
                </div>
              )}

              {/* Clue */}
              {q.clueType === 'image' ? (
                <img src={q.clue} onError={(e) => { e.target.src = q.fallback; }} className="w-32 h-32 rounded-2xl border-4 border-white mb-6 object-cover shadow-lg" />
              ) : (
                <p className="font-bold text-xl sm:text-2xl text-wwYellow mb-6 text-center leading-relaxed">"{q.clue}"</p>
              )}

              {/* Slots */}
              <div className="flex gap-1 sm:gap-2 mb-6 flex-wrap justify-center">
                {q.target.split('').map((char, i) => {
                  if (char === ' ') return <div key={i} className="w-4 sm:w-6"></div>;
                  const pl = placedLetters[i];
                  let slotColor = "bg-white/20";
                  let animation = "";
                  if (pl) {
                    if (pl.status === 'correct') slotColor = "bg-green-500";
                    if (pl.status === 'wrong') { slotColor = "bg-wwRed"; animation = "animate-pulse translate-y-1"; }
                  }

                  return (
                    <div key={i} className={`w-10 h-10 sm:w-12 sm:h-12 border-4 border-white rounded-xl flex items-center justify-center font-title text-xl sm:text-2xl text-white shadow-inner transition-all ${slotColor} ${animation}`}>
                      {pl ? pl.char : ''}
                    </div>
                  );
                })}
              </div>

              {/* Letters Pool */}
              <div className="flex flex-wrap justify-center gap-2">
                {shuffledLetters.map((l) => (
                  <button key={l.id} disabled={!timerActive} onClick={() => handleLetterClick(l)} className="w-12 h-12 sm:w-14 sm:h-14 bg-wwDarkBlue border-4 border-white text-white rounded-xl font-title text-2xl shadow-[0_4px_0_0_#1e3a8a] hover:bg-wwBlue hover:-translate-y-1 active:translate-y-1 active:shadow-none transition-all disabled:opacity-50">
                    {l.char}
                  </button>
                ))}
              </div>
            </div>

            {/* Hint System */}
            <div className="flex justify-center h-12">
              {mistakes >= 3 && shuffledLetters.length > 0 && timerActive && (
                <button onClick={handleHint} className="btn-ww px-6 py-2 flex items-center gap-2 bg-wwYellow text-wwDarkBlue hover:bg-yellow-400">
                  <Icon name="lightbulb" size={20} /> Bantuan
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function LevelResultScreen({ score, total, onRetry, onNextLevel, onMenu }) {
      const percentage = (score / total) * 100;
      const passed = percentage >= 50;

      let stars = 0;
      if (percentage >= 90) stars = 3;
      else if (percentage >= 70) stars = 2;
      else if (percentage >= 50) stars = 1;

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-blob relative p-4 slide-up-fade">
          <BackgroundDecor />
          <div className="card-ww max-w-md w-full p-8 relative text-center z-10">
            <h2 className="font-title text-4xl text-white text-shadow-thick mb-6">
              {passed ? "GESCHAFFT!" : "SCHADE!"}
            </h2>

            <div className="flex justify-center gap-2 mb-6">
              {[1, 2, 3].map(s => (
                <Icon key={s} name="star" size={60} className={s <= stars ? "text-wwYellow fill-wwYellow drop-shadow-lg" : "text-gray-400 fill-gray-400"} />
              ))}
            </div>

            <div className="inner-box p-6 mb-8 text-center">
              <p className="font-bold text-xl text-white mb-2">Skor Kamu</p>
              <h3 className="text-6xl font-title text-wwYellow drop-shadow-md mb-2">{score}/{total}</h3>
              <p className="font-bold text-white">
                {passed ? "Bagus! Kamu bisa lanjut ke tahap berikutnya." : "Versuch es noch einmal! (Coba lagi!)"}
              </p>
            </div>

            <div className="flex flex-col gap-4">
              {passed ? (
                <button onClick={() => { playClick(); onNextLevel(); }} className="btn-ww red w-full py-4 text-xl">
                  TAHAP BERIKUTNYA
                </button>
              ) : (
                <button onClick={() => { playClick(); onRetry(); }} className="btn-ww red w-full py-4 text-xl">

              )}
              <button onClick={() => { playClick(); onMenu(); }} className="w-full bg-wwDarkBlue text-white font-bold py-3 rounded-full border-2 border-white hover:bg-wwBlue">
                KEMBALI KE MENU
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- FLYING BIRDS (realistis, tersebar penuh layar) ---
    function FlyingBirds() {
      // size = tinggi badan burung (px di viewBox)
      // Tersebar dari atas (5%) sampai bawah (88%)
      const birds = [
        { size: 7,  top: '5%',  dur: '16s', delay: '-4s',  flap: '0.28s' },
        { size: 5,  top: '12%', dur: '22s', delay: '-11s', flap: '0.40s' },
        { size: 8,  top: '20%', dur: '12s', delay: '-2s',  flap: '0.33s' },
        { size: 6,  top: '30%', dur: '18s', delay: '-15s', flap: '0.25s' },
        { size: 9,  top: '40%', dur: '25s', delay: '-8s',  flap: '0.50s' },
        { size: 5,  top: '52%', dur: '14s', delay: '-20s', flap: '0.36s' },
        { size: 8,  top: '62%', dur: '20s', delay: '-6s',  flap: '0.30s' },
        { size: 6,  top: '72%', dur: '17s', delay: '-13s', flap: '0.45s' },
        { size: 7,  top: '80%', dur: '13s', delay: '-3s',  flap: '0.38s' },
        { size: 4,  top: '88%', dur: '24s', delay: '-17s', flap: '0.22s' },
        { size: 8,  top: '46%', dur: '19s', delay: '-9s',  flap: '0.42s' },
        { size: 6,  top: '25%', dur: '15s', delay: '-7s',  flap: '0.29s' },
      ];
      const color = '#111827';
      return (
        <div className="absolute inset-0 overflow-hidden pointer-events-none" style={{ zIndex: 2 }}>
          {birds.map((b, i) => {
            // Bangun dimensi SVG dari ukuran badan burung
            const W  = b.size * 7;
            const H  = b.size * 4;
            const cx = W / 2;
            const cy = H / 2;
            const sw = Math.max(1.2, b.size * 0.22);
            const lx = cx * 0.06;    const ly = cy - H * 0.18;
            const rx = W - cx * 0.06; const ry = cy - H * 0.18;
            const lqx = cx * 0.48; const lqy = cy - H * 0.44;
            const rqx = W - cx * 0.48; const rqy = cy - H * 0.44;
            return (
              <div
                key={i}
                className="absolute animate-drift"
                style={{ top: b.top, animationDuration: b.dur, animationDelay: b.delay }}
              >
                <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
                  <ellipse cx={cx} cy={cy} rx={b.size * 0.55} ry={b.size * 0.28} fill={color} />
                  <circle cx={cx + b.size * 0.5} cy={cy - b.size * 0.18} r={b.size * 0.22} fill={color} />
                  <g style={{ transformOrigin: `${cx}px ${cy}px`, animation: `birdWingL ${b.flap} ease-in-out infinite alternate` }}>
                    <path d={`M${cx} ${cy} Q${lqx} ${lqy} ${lx} ${ly}`} stroke={color} strokeWidth={sw} strokeLinecap="round" fill="none" />
                  </g>
                  <g style={{ transformOrigin: `${cx}px ${cy}px`, animation: `birdWingR ${b.flap} ease-in-out infinite alternate` }}>
                    <path d={`M${cx} ${cy} Q${rqx} ${rqy} ${rx} ${ry}`} stroke={color} strokeWidth={sw} strokeLinecap="round" fill="none" />
                  </g>
                  <path d={`M${cx - b.size * 0.4} ${cy + b.size * 0.1} L${cx - b.size * 0.9} ${cy + b.size * 0.5}`} stroke={color} strokeWidth={sw * 0.8} strokeLinecap="round" fill="none" />
                </svg>
              </div>
            );
          })}
        </div>
      );
    }

    // --- SPLASH SCREEN ---
    function SplashScreen({ onNext }) {
      // phase: idle → btn-exit → title-focus → fading → done
      const [phase, setPhase] = useState('idle');

      const handleStart = () => {
        if (phase !== 'idle') return;
        playClick();
        // Step 1: tombol mengecil & hilang (0.35s)
        setPhase('btn-exit');
        // Step 2: setelah tombol hilang, judul membesar dengan glow
        setTimeout(() => setPhase('title-focus'), 380);
        // Step 3: setelah judul fokus (0.9s) + jeda 2s → fade to black
        setTimeout(() => setPhase('fading'), 380 + 900 + 2000);
        // Step 4: navigate + mulai BGM bersamaan saat halaman baru muncul
        setTimeout(() => { startBGM(); onNext(); }, 380 + 900 + 2000 + 750);
      };

      const isTransitioning = phase !== 'idle';

      return (
        <div
          className="flex flex-col items-center justify-center min-h-screen bg-blue-500 relative overflow-hidden slide-up-fade"
          style={{ pointerEvents: isTransitioning ? 'none' : 'auto' }}

    function RankingScreen({ playerName, finalScore, onBack }) {
      const [leaderboard, setLeaderboard] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [expandedPlayer, setExpandedPlayer] = useState(null);

      useEffect(() => {
        const fetchRanking = async () => {
          try {
            const payload = { action: 'get_ranking' };
            const res = await fetch('https://script.google.com/macros/s/AKfycbwm25x5aiH4ILUuibHYpmi8Eaw1946e6i8D7IoLPkwJxYT4bUAsb_iznywFE9P5YuRdOg/exec', {
              method: 'POST',
              body: JSON.stringify(payload),
              headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            const data = await res.json();
            
            const grouped = {};
            data.forEach((row, index) => {
              const name = row.nama;
              if (!grouped[name]) {
                grouped[name] = { name: name, history: [], bestScore: -1, bestTime: Infinity };
              }
              const score = Number(row.skor) || 0;
              const time = Number(row.waktu) || 0;
              
              const attempt = { ...row, skor: score, waktu: time, originalIndex: index };
              grouped[name].history.push(attempt);
              
              if (score > grouped[name].bestScore || (score === grouped[name].bestScore && time < grouped[name].bestTime)) {
                grouped[name].bestScore = score;
                grouped[name].bestTime = time;
                grouped[name].bestAttempt = attempt;
              }
            });

            const sorted = Object.values(grouped).sort((a, b) => {
              if (b.bestScore !== a.bestScore) return b.bestScore - a.bestScore;
              return a.bestTime - b.bestTime;
            });
            
            setLeaderboard(sorted);
          } catch (e) {
            console.error('Fetch ranking error:', e);
          } finally {
            setIsLoading(false);
          }
        };
        fetchRanking();
      }, []);

      const getMedalColor = (index) => {
        if (index === 0) return 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]';
        if (index === 1) return 'text-gray-300 drop-shadow-[0_0_8px_rgba(209,213,219,0.8)]';
        if (index === 2) return 'text-orange-400 drop-shadow-[0_0_8px_rgba(251,146,60,0.8)]';
        return 'text-white';
      };

      const formatTime = (secs) => {
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        return `${m > 0 ? m + 'm ' : ''}${s}s`;
      };

      return (
        <div className="flex flex-col items-center min-h-screen bg-blob relative p-4 slide-up-fade overflow-y-auto">
          <BackgroundDecor />
          <div className="card-ww max-w-3xl w-full p-4 sm:p-8 relative mt-6 mb-6">
            <button onClick={() => { playClick(); onBack(); }} className="absolute top-4 right-4 bg-wwRed text-white rounded-full p-2 border-2 border-white shadow-[0_0_0_2px_#1e3a8a] z-20 hover:scale-105 active:scale-95 transition-transform">
              <Icon name="x" size={24} />
            </button>
            <Icon name="trophy" size={60} className="text-wwYellow mx-auto mb-2 drop-shadow-lg" />
            <h2 className="font-title text-3xl sm:text-4xl text-center text-white text-shadow-thick mb-6">PAPAN PERINGKAT</h2>

            {isLoading ? (
              <div className="flex flex-col items-center justify-center py-12">
                <Icon name="loader-2" size={48} className="text-white animate-spin mb-4" />
                <p className="text-white font-bold text-xl animate-pulse">Memuat data...</p>
              </div>
            ) : (
              <div className="space-y-3">
                {leaderboard.map((player, index) => (
                  <div key={player.name} className="flex flex-col">
                    <div 
                      onClick={() => { playClick(); setExpandedPlayer(expandedPlayer === player.name ? null : player.name); }}
                      className={`relative flex items-center justify-between p-4 rounded-xl border-4 cursor-pointer transition-transform hover:scale-[1.02] active:scale-[0.98] ${playerName === player.name ? 'bg-wwYellow border-white' : 'bg-wwDarkBlue border-wwBlue'} ${expandedPlayer === player.name ? 'rounded-b-none border-b-0' : ''}`}
                    >
                      <div className="flex items-center gap-4">
                        <div className="w-10 flex justify-center">
                          {index < 3 ? (
                            <Icon name="trophy" size={28} className={getMedalColor(index)} />
                          ) : (
                            <span className="font-title text-2xl text-white">{index + 1}</span>
                          )}
                        </div>
                        <span className={`font-bold text-lg sm:text-xl truncate max-w-[120px] sm:max-w-[200px] ${playerName === player.name ? 'text-wwDarkBlue' : 'text-white'}`}>{player.name}</span>
                      </div>
                      <div className={`flex items-center gap-4 font-title text-xl sm:text-2xl ${playerName === player.name ? 'text-wwRed' : 'text-wwYellow'}`}>
                        <span>{player.bestScore}</span>
                        <span className="text-sm sm:text-base font-sans opacity-80">{formatTime(player.bestTime)}</span>
                        <Icon name={expandedPlayer === player.name ? "chevron-up" : "chevron-down"} size={20} className="text-white" />
                      </div>
                    </div>
                    
                    {/* Expandable History */}
                    {expandedPlayer === player.name && (
                      <div className={`p-4 rounded-b-xl border-4 border-t-0 slide-down-fade space-y-2 ${playerName === player.name ? 'bg-wwYellow border-white' : 'bg-wwDarkBlue border-wwBlue'}`}>
                        <div className={`text-xs font-bold mb-2 uppercase ${playerName === player.name ? 'text-wwDarkBlue' : 'text-white/70'}`}>Riwayat Bermain:</div>
                        {player.history.map((attempt, i) => {
                          const isBest = attempt.originalIndex === player.bestAttempt.originalIndex;
                          return (
                            <div key={i} className={`flex justify-between items-center p-2 rounded-lg ${isBest ? 'bg-green-500 text-white border-2 border-white font-bold shadow-md' : (playerName === player.name ? 'bg-white/30 text-wwDarkBlue' : 'bg-white/10 text-white')}`}>
                              <div className="flex flex-col sm:flex-row sm:gap-2">
                                <span>Percobaan {i + 1} {isBest ? '(Skor Utama)' : ''}</span>
                                <span className="text-xs opacity-80 sm:mt-1">{attempt.tanggal}</span>
                              </div>
                              <div className="flex gap-4 text-sm sm:text-base">
                                <span>Skor: {attempt.skor}</span>
                                <span>Waktu: {formatTime(attempt.waktu)}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                ))}
                {leaderboard.length === 0 && (
                  <div className="text-center text-white py-8 font-bold">Belum ada data peringkat.</div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [currentScreen, setCurrentScreen] = useState('splash');
      const [playerName, setPlayerName] = useState(localStorage.getItem('namaPemain') || '');
      const [finalScore, setFinalScore] = useState(0); // Cumulative score across levels
      const [gameStartTime, setGameStartTime] = useState(null);

      const [unlockedLevel, setUnlockedLevel] = useState(1);
      const [selectedLevel, setSelectedLevel] = useState(1);

      const submitScoreToGAS = async (nama, skor, waktu) => {
        try {
          const payload = {
            action: 'save_score',
            nama: nama,
            skor: skor,
            waktu: waktu,
            tanggal: new Date().toLocaleString('id-ID')
          };
          fetch('https://script.google.com/macros/s/AKfycbwm25x5aiH4ILUuibHYpmi8Eaw1946e6i8D7IoLPkwJxYT4bUAsb_iznywFE9P5YuRdOg/exec', {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
        } catch (e) {
          console.error('Error saving score:', e);
        }
      };

      useEffect(() => {
        if (currentScreen !== 'splash') {
          if (currentScreen === 'wortsalat' || currentScreen === 'level_result') {
            startBGM('game');
          } else {
            startBGM('menu');
          }
        }
      }, [currentScreen]);

      const navigateTo = (screen) => { window.scrollTo(0, 0); setCurrentScreen(screen); };

      const handleLevelSelect = (level) => {
        setSelectedLevel(level);
        if (level === 1) {
          setGameStartTime(Date.now());
          setFinalScore(0);
        }
        navigateTo('wortsalat');
      };

      const handleLevelFinish = (correctAnswers, totalQuestions) => {
        const percentage = (correctAnswers / totalQuestions) * 100;
        setFinalScore(s => s + (correctAnswers * 100)); // 100 pts per correct answer globally

        if (percentage >= 50 && selectedLevel === unlockedLevel && unlockedLevel < 3) {
          setUnlockedLevel(unlockedLevel + 1); // Unlock next level
        }

        navigateTo('level_result');
      };

      return (
        <div className="app-container">
          {currentScreen === 'splash' && <SplashScreen onNext={() => navigateTo('profile')} />}
          {currentScreen === 'profile' && <DeveloperProfile onNext={() => navigateTo('instructions')} />}
          {currentScreen === 'instructions' && <Instructions onNext={() => navigateTo('main')} />}
          {currentScreen === 'menu_profile' && <DeveloperProfile onBack={() => navigateTo('main')} />}
          {currentScreen === 'menu_instructions' && <Instructions onBack={() => navigateTo('main')} />}
          {currentScreen === 'main' && <MainMenu onNavigate={navigateTo} />}
          {currentScreen === 'login' && <LoginScreen onNext={(name) => { setPlayerName(name); navigateTo('level_select'); }} onBack={() => navigateTo('main')} />}
          {currentScreen === 'level_select' && <LevelSelectScreen unlockedLevel={unlockedLevel} onSelectLevel={handleLevelSelect} onBack={() => navigateTo('main')} />}
          {currentScreen === 'lernen' && <LernenScreen onBack={() => navigateTo('main')} onNavigate={navigateTo} />}
          {currentScreen === 'wortsalat' && <WortsalatScreen level={selectedLevel} onFinish={handleLevelFinish} onBack={() => navigateTo('level_select')} />}
          {currentScreen === 'level_result' && (
            <LevelResultScreen
              score={finalScore % 2000 === 0 && finalScore > 0 ? 20 : Math.round((finalScore % 2000) / 100)} // Approximate correct answers for the level based on score logic
              total={20}
              onRetry={() => navigateTo('wortsalat')}
              onNextLevel={() => {
                if (selectedLevel < 3) {
                  setSelectedLevel(selectedLevel + 1);
                  navigateTo('wortsalat');
                } else {
                  const tTime = gameStartTime ? Math.floor((Date.now() - gameStartTime) / 1000) : 0;
                  submitScoreToGAS(playerName, finalScore, tTime);
                  navigateTo('ranking'); // Finished all levels
                }
              }}
              onMenu={() => navigateTo('level_select')}
            />
          )}
          {currentScreen === 'ranking' && <RankingScreen playerName={playerName} finalScore={finalScore} onBack={() => navigateTo('main')} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
