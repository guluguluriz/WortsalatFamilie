<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wortsalat Game</title>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts: Titan One for titles, Nunito for text, Montserrat for Spotify theme -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Titan+One&family=Montserrat:wght@600;700;800;900&display=swap"
    rel="stylesheet">

  <style>
    /* Menghilangkan ikon mata bawaan browser agar tidak ganda */
    input::-ms-reveal,
    input::-ms-clear {
      display: none;
    }
    input[type="password"]::-webkit-reveal {
      display: none;
    }

    :root {
      --clr-ww-blue:     #282828;
      --clr-ww-darkblue: #121212;
      --clr-ww-yellow:   #1DB954;
      --clr-ww-red:      #ef4444;
      --clr-ww-white:    #ffffff;
      /* Spotify Dark palette */
      --sp-bg:       #121212;
      --sp-surface:  #181818;
      --sp-elevated: #282828;
      --sp-accent:   #1DB954;
      --sp-accent-lt:#1ed760;
      --sp-text:     #ffffff;
      --sp-muted:    #B3B3B3;
      --sp-border:   rgba(255,255,255,0.1);
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #121212;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      margin: 0;
    }

    .font-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    /* Wordwall Backgrounds */
    .bg-sunburst {
      background-color: var(--clr-ww-blue);
      background-image: repeating-conic-gradient(var(--clr-ww-darkblue) 0 15deg,
          transparent 15deg 30deg);
      background-position: center center;
    }

    .bg-blob {
      background-color: var(--clr-ww-blue);
      position: relative;
    }

    .bg-blob::before,
    .bg-blob::after {
      content: "";
      position: absolute;
      width: 150vw;
      height: 150vw;
      background: rgba(30, 58, 138, 0.2);
      border-radius: 40%;
      z-index: -1;
      animation: rotateBlob 40s linear infinite;
    }

    .bg-blob::before {
      top: -100vw;
      left: -50vw;
    }

    .bg-blob::after {
      bottom: -100vw;
      right: -50vw;
      animation-direction: reverse;
    }

    @keyframes rotateBlob {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes driftRight {
      0% { transform: translateX(-300px); }
      100% { transform: translateX(calc(100vw + 300px)); }
    }
    .animate-drift {
      animation: driftRight linear infinite;
    }

    /* Breathe Animation for Titles */
    .animate-breathe {
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1) translateY(0);
      }

      50% {
        transform: scale(1.05) translateY(-5px);
      }
    }

    /* Pop-in Animation for Feedback Overlay */
    @keyframes popIn {
      0% { transform: translateX(-50%) scale(0.9); opacity: 0; }
      70% { transform: translateX(-50%) scale(1.05); opacity: 1; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    .animate-pop-in {
      animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Floating Decor Animation */
    .float-decor {
      position: absolute;
      animation: floatItem 6s ease-in-out infinite;
      color: rgba(252, 211, 77, 0.6);
      /* Yellow with opacity */
      z-index: 0;
    }

    @keyframes floatItem {

      0%,
      100% {
        transform: translateY(0) rotate(-5deg);
      }

      50% {
        transform: translateY(-20px) rotate(5deg);
      }
    }

    /* Text Outline (Stroke) Hack */
    .text-stroke-thick {
      -webkit-text-stroke: 8px var(--clr-ww-darkblue);
      paint-order: stroke fill;
      filter: drop-shadow(0px 8px 0px rgba(0, 0, 0, 0.3));
    }

    /* Fallback for browsers that don't support paint-order well */
    .text-shadow-thick {
      text-shadow:
        -4px -4px 0 var(--clr-ww-darkblue),
        0 -4px 0 var(--clr-ww-darkblue),
        4px -4px 0 var(--clr-ww-darkblue),
        4px 0 0 var(--clr-ww-darkblue),
        4px 4px 0 var(--clr-ww-darkblue),
        0 4px 0 var(--clr-ww-darkblue),
        -4px 4px 0 var(--clr-ww-darkblue),
        -4px 0 0 var(--clr-ww-darkblue),
        0 8px 0 rgba(0, 0, 0, 0.3);
    }

    /* Wordwall Card Container */
    .card-ww {
      background: var(--clr-ww-blue);
      border: 6px solid var(--clr-ww-white);
      border-radius: 30px;
      box-shadow: 0 0 0 6px var(--clr-ww-darkblue), 0 15px 30px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 10;
      /* Inner blob pattern for cards */
      background-image: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 40%);
    }

    /* Pill Buttons */
    .btn-ww {
      background: var(--clr-ww-blue);
      color: var(--clr-ww-white);
      border: 4px solid var(--clr-ww-white);
      border-radius: 9999px;
      box-shadow: 0 0 0 4px var(--clr-ww-darkblue), 0 8px 0 4px var(--clr-ww-darkblue);
      font-family: 'Titan One', cursive;
      text-transform: uppercase;
      transition: all 0.1s ease;
      position: relative;
      letter-spacing: 1px;
    }

    .btn-ww:active:not(:disabled) {
      transform: translateY(6px);
      box-shadow: 0 0 0 4px var(--clr-ww-darkblue), 0 2px 0 4px var(--clr-ww-darkblue);
    }

    .btn-ww.red {
      background: var(--clr-ww-red);
    }

    /* Next/Right Nav Button */
    .btn-nav-round {
      background: var(--clr-ww-blue);
      color: var(--clr-ww-white);
      border: 4px solid var(--clr-ww-white);
      border-radius: 50%;
      box-shadow: 0 0 0 4px var(--clr-ww-darkblue), 0 6px 0 4px var(--clr-ww-darkblue);
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      transition: all 0.1s ease;
      cursor: pointer;
    }

    .btn-nav-round:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 4px var(--clr-ww-darkblue), 0 2px 0 4px var(--clr-ww-darkblue);
    }

    .btn-nav-corner {
      bottom: -10px;
      right: -10px;
    }

    /* Inner text boxes (like instructions/profile) */
    .inner-box {
      background: rgba(0, 0, 0, 0.2);
      border: 3px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      color: white;
    }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 4px;
    }

    /* Hide scrollbar for custom elements */
    .custom-scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .custom-scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Screen Transitions */
    .slide-up-fade {
      animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* =============================================
       RESPONSIVE LAYOUT SYSTEM
       ============================================= */

    /* App Container — prevents ultra-wide stretching */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
    }

    /* ---- FLUID TYPOGRAPHY ---- */
    .text-fluid-xs   { font-size: clamp(0.75rem,  1.8vw, 0.875rem); }
    .text-fluid-sm   { font-size: clamp(0.875rem, 2.2vw, 1rem);     }
    .text-fluid-base { font-size: clamp(0.9rem,   2.5vw, 1.1rem);   }
    .text-fluid-lg   { font-size: clamp(1rem,     2.8vw, 1.25rem);  }

    /* ---- TOUCH TARGET (WCAG 2.5.5 — min 44×44px) ---- */
    .touch-target {
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- DIALOG BOTTOM SHEET ---- */
    /* Mobile-first: full-width bottom sheet */
    .dialog-sheet-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .dialog-sheet-inner {
      width: 100%;
      pointer-events: auto;
    }

    /* Tablet ≥ 640px: limit width, round top corners */
    /* overflow: visible agar speech bubble & portrait tidak terpotong */
    @media (min-width: 640px) {
      .dialog-sheet-inner {
        max-width: 680px;
        overflow: visible;
      }
    }

    /* Desktop ≥ 1024px: wider panel */
    @media (min-width: 1024px) {
      .dialog-sheet-inner {
        max-width: 900px;
      }
    }

    /* Dialog panel */
    .dialog-panel {
      background-color: var(--clr-ww-darkblue);
      border-top: 5px solid white;
      width: 100%;
      box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: row;
      align-items: stretch;
      padding-top: 8px;
      padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
      min-height: clamp(120px, 28vw, 170px);
      position: relative;
    }

    @media (min-width: 640px) {
      .dialog-panel {
        border: 5px solid white;
        border-bottom: none;
        border-radius: 24px 24px 0 0;
        padding-top: 14px;
        padding-bottom: 18px;
      }
    }

    /* Portrait wrap — responsive width slot */
    .dialog-portrait-wrap {
      width: clamp(78px, 24vw, 158px);
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }

    /* Portrait image — scales without distortion */
    .dialog-portrait-img {
      position: absolute;
      bottom: 0;
      left: 0;
      width: clamp(98px, 31vw, 215px);
      height: auto;
      max-height: clamp(165px, 46vw, 310px);
      object-fit: contain;
      object-position: bottom;
      max-width: none;
      filter: drop-shadow(5px 5px 12px rgba(0, 0, 0, 0.5));
    }

    /* Content area right of portrait */
    .dialog-content-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      /* top: lebih besar agar avatar/nama tidak tertutup bubble */
      /* left: geser teks kanan agar tidak dempet ke foto Alanna */
      /* right: ruang untuk tombol X */
      padding: clamp(16px, 4vw, 22px)
               clamp(52px, 13vw, 92px)
               clamp(8px, 2vw, 14px)
               clamp(28px, 7vw, 68px);
    }

    /* Scrollable text inside dialog (prevents height blow-up) */
    .dialog-text-area {
      overflow-y: auto;
      max-height: clamp(80px, 25vw, 155px);
      line-height: 1.6;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
    }

    .dialog-text-area::-webkit-scrollbar { width: 5px; }
    .dialog-text-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
    }

    /* Speech bubble — ramping/sempit, tidak menutupi avatar di atas */
    .speech-bubble-anchor {
      position: absolute;
      top: clamp(-38px, -10vw, -52px);
      left: clamp(80px, 24vw, 180px);
      z-index: 30;
    }

    .speech-bubble-label {
      position: relative;
      background-color: var(--clr-ww-yellow);
      color: var(--clr-ww-darkblue);
      font-family: 'Titan One', cursive;
      padding: 2px clamp(8px, 2vw, 16px);
      border-radius: 8px;
      font-size: clamp(0.58rem, 2.1vw, 0.84rem);
      border: 2px solid white;
      z-index: 20;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Developer profile text scroll */
    .devprofile-text-scroll {
      overflow-y: auto;
      max-height: clamp(140px, 38vh, 300px);
      line-height: 1.6;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
    }

    .devprofile-text-scroll::-webkit-scrollbar { width: 5px; }
    .devprofile-text-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
    }

    /* ---- DIALOG BACKDROP — blur + gradient overlay saat dialog muncul ---- */
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      z-index: 48;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(14, 36, 100, 0.08) 40%,
        rgba(14, 36, 100, 0.35) 75%,
        rgba(14, 36, 100, 0.55) 100%
      );
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,0,0,0.15) 35%,
        rgba(0,0,0,0.6) 65%,
        black 88%
      );
      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,0,0,0.15) 35%,
        rgba(0,0,0,0.6) 65%,
        black 88%
      );
      animation: slideUpFadeOuter 0.4s ease forwards;
    }

    /* ---- OUTER SCREEN FADE (opacity only — NO transform) ----
       Penting: animasi dengan transform menciptakan stacking context baru
       sehingga position:fixed di dalamnya tidak bisa keluar ke viewport.
       Gunakan class ini untuk wrapper screen yang mengandung dialog fixed. */
    .slide-up-fade-outer {
      animation: slideUpFadeOuter 0.45s ease forwards;
    }
    @keyframes slideUpFadeOuter {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    /* ---- ANIMATED WAVES (Splash Screen) ---- */
    @keyframes waveMove {
      0%   { transform: translateX(0);   }
      100% { transform: translateX(-50%); }
    }
    .wave-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 100%;
      animation: waveMove linear infinite;
    }

    /* ---- SPLASH TRANSITION ---- */
    /* 1. Tombol mengecil dan hilang */
    @keyframes btnExit {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    .btn-exiting {
      animation: btnExit 0.35s cubic-bezier(0.4,0,1,1) forwards;
      pointer-events: none;
    }

    /* 2. Judul membesar ke tengah dengan glow */
    @keyframes titleFocus {
      0%   { transform: scale(1);   filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
      30%  { transform: scale(1.25); filter: drop-shadow(0 0 18px rgba(255,255,255,0.55)); }
      70%  { transform: scale(1.55); filter: drop-shadow(0 0 35px rgba(255,255,255,0.75)) drop-shadow(0 0 70px rgba(252,211,77,0.5)); }
      85%  { transform: scale(1.6);  filter: drop-shadow(0 0 45px rgba(255,255,255,0.9)) drop-shadow(0 0 90px rgba(252,211,77,0.65)); }
      100% { transform: scale(1.6);  filter: drop-shadow(0 0 45px rgba(255,255,255,0.9)) drop-shadow(0 0 90px rgba(252,211,77,0.65)); }
    }
    .title-focused {
      animation: titleFocus 0.9s cubic-bezier(0.2,0,0.3,1) forwards;
      position: relative; z-index: 12;
    }

    /* 3. Fade to black overlay */
    @keyframes fadeToBlack {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    .splash-fade-black {
      position: fixed; inset: 0;
      background: black;
      z-index: 100;
      pointer-events: none;
      animation: fadeToBlack 0.75s ease-in forwards;
    }

    /* ---- SPLASH-AUTH PRELOADER ---- */
    /* Title wrapper — transitions vertically */
    .sa-title-wrap {
      position: absolute;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      padding: 0 1rem;
      transition: top 0.85s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10;
    }

    /* Preloader track */
    .sa-progress-track {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      overflow: hidden;
    }
    .sa-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #3b82f6 0%, #fcd34d 50%, #3b82f6 100%);
      background-size: 200% 100%;
      animation: saShimmer 1.8s linear infinite;
      transition: width 0.35s ease;
    }
    @keyframes saShimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Auth form fade-up in */
    @keyframes saAuthIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .sa-auth-in {
      animation: saAuthIn 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Progress section fade in/out */
    @keyframes saFadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes saFadeOut { from { opacity: 1; } to { opacity: 0; } }
    .sa-fade-in  { animation: saFadeIn  0.4s ease forwards; }
    .sa-fade-out { animation: saFadeOut 0.4s ease forwards; }

    /* Title scale-back when rising after preload */
    @keyframes titleReturn {
      from { transform: scale(1.6); filter: drop-shadow(0 0 45px rgba(255,255,255,0.85)) drop-shadow(0 0 80px rgba(252,211,77,0.6)); }
      to   { transform: scale(1);   filter: none; }
    }
    .title-returning {
      animation: titleReturn 0.75s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* ============================================================
       SPOTIFY DARK THEME — scoped to .spotify-splash
       Hanya berlaku di SplashAuthScreen, tidak mengubah game lain
       ============================================================ */
    .spotify-splash {
      background-color: #121212 !important;
      font-family: 'Montserrat', sans-serif !important;
    }
    /* Override bg-blob rotating blobs agar tidak nampak di Spotify theme */
    .spotify-splash.bg-blob::before,
    .spotify-splash.bg-blob::after { opacity: 0; }

    /* Sembunyikan blob background default, ganti dengan #121212 */
    .spotify-splash .bg-blob { background-color: #121212 !important; }

    /* Wave layers: abu-abu gelap Spotify (variasi kedalaman) */
    .spotify-splash svg path { fill: rgba(28, 28, 28, 0.92) !important; }
    /* Wave tengah sedikit lebih terang */
    .spotify-splash svg:nth-child(2) path { fill: rgba(36, 36, 36, 0.88) !important; }
    /* Wave depan paling terang */
    .spotify-splash svg:nth-child(3) path { fill: rgba(44, 44, 44, 0.85) !important; }

    /* Judul WORTSALAT — putih bersih, tanpa cartoon shadow */
    .spotify-splash h1:first-of-type {
      color: #FFFFFF !important;
      text-shadow: none !important;
      -webkit-text-stroke: 0 !important;
      font-family: 'Montserrat', sans-serif !important;
      letter-spacing: 4px;
    }
    /* Judul FAMILIE — Spotify Green, tanpa cartoon shadow */
    .spotify-splash h1:last-of-type {
      color: #1DB954 !important;
      text-shadow: none !important;
      -webkit-text-stroke: 0 !important;
      font-family: 'Montserrat', sans-serif !important;
      letter-spacing: 4px;
    }

    /* Override .text-shadow-thick di dalam spotify-splash */
    .spotify-splash .text-shadow-thick {
      text-shadow: none !important;
    }

    /* Tombol ANFANGEN: Spotify Green, teks hitam, tanpa border tebal */
    .spotify-splash .btn-anfangen {
      background: #1DB954 !important;
      color: #000000 !important;
      border: none !important;
      box-shadow: 0 4px 14px rgba(29, 185, 84, 0.4) !important;
      font-family: 'Montserrat', sans-serif !important;
      font-weight: 800 !important;
      letter-spacing: 3px;
      border-radius: 9999px;
    }
    .spotify-splash .btn-anfangen:hover {
      background: #1ed760 !important;
      transform: scale(1.04);
    }
    .spotify-splash .btn-anfangen:active {
      transform: scale(0.97) !important;
      box-shadow: 0 2px 6px rgba(29, 185, 84, 0.3) !important;
    }

    /* Ikon dekorasi: abu-abu Spotify (#B3B3B3) */
    .spotify-splash .float-decor {
      color: #B3B3B3 !important;
      opacity: 0.35 !important;
    }

    /* Progress bar — Spotify green */
    .spotify-splash .sa-progress-fill {
      background: linear-gradient(90deg, #1DB954 0%, #1ed760 50%, #1DB954 100%) !important;
    }

    /* Semua teks umum di splash: Montserrat */
    .spotify-splash * {
      font-family: 'Montserrat', sans-serif;
    }
    /* Kecualikan font-title (TitleText): tetap pakai Montserrat tapi bold */
    .spotify-splash .font-title {
      font-family: 'Montserrat', sans-serif !important;
      font-weight: 900 !important;
      letter-spacing: 3px;
    }
    /* ================================================================
       SPOTIFY DARK MODE — TEMA GLOBAL
    ================================================================ */

    /* Backgrounds */
    .bg-blob, .bg-sunburst { background-color: var(--sp-bg) !important; background-image: none !important; }
    .bg-blob::before, .bg-blob::after { background: rgba(255,255,255,0.015) !important; }
    .min-h-screen { background-color: var(--sp-bg); }

    /* Floating decor */
    .float-decor { color: var(--sp-muted) !important; opacity: 0.22 !important; }

    /* Remove cartoon text shadows */
    .text-shadow-thick { text-shadow: none !important; }
    .text-stroke-thick { -webkit-text-stroke: 0 !important; filter: none !important; }

    /* Cards & Modals */
    .card-ww {
      background: var(--sp-surface) !important;
      border: 1px solid var(--sp-border) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important;
      background-image: none !important;
    }
    .inner-box {
      background: var(--sp-elevated) !important;
      border: 1px solid rgba(255,255,255,0.07) !important;
    }

    /* Buttons — secondary (dark surface) */
    .btn-ww {
      background: var(--sp-elevated) !important;
      color: var(--sp-text) !important;
      border: 1px solid rgba(255,255,255,0.18) !important;
      box-shadow: none !important;
      font-family: 'Montserrat', sans-serif !important;
      font-weight: 700 !important;
    }
    .btn-ww:active:not(:disabled) { transform: scale(0.97) !important; box-shadow: none !important; }

    /* Buttons — primary CTA → Spotify Green */
    .btn-ww.red {
      background: var(--sp-accent) !important;
      color: #000000 !important;
      border: none !important;
      box-shadow: 0 4px 14px rgba(29,185,84,0.35) !important;
    }
    .btn-ww.red:hover:not(:disabled) { background: var(--sp-accent-lt) !important; }

    /* Nav round buttons → green */
    .btn-nav-round {
      background: var(--sp-accent) !important;
      color: #000 !important;
      border: none !important;
      box-shadow: none !important;
    }

    /* Form inputs */
    input[type="text"], input[type="email"], input[type="password"] {
      background-color: var(--sp-elevated) !important;
      color: var(--sp-text) !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      border-radius: 8px !important;
    }
    input:focus {
      border-color: var(--sp-accent) !important;
      outline: none !important;
      box-shadow: 0 0 0 2px rgba(29,185,84,0.25) !important;
    }
    input::placeholder { color: var(--sp-muted) !important; }

    /* Dialog bottom sheet */
    .dialog-panel {
      background-color: var(--sp-surface) !important;
      border-color: rgba(255,255,255,0.1) !important;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.7) !important;
    }
    .speech-bubble-label {
      background-color: var(--sp-accent) !important;
      color: #000 !important;
      border-color: transparent !important;
    }

    /* Correct/green slots — use Spotify green */
    .bg-green-500 { background-color: var(--sp-accent) !important; }
    .bg-green-500\/90 { background-color: rgba(29,185,84,0.9) !important; }
    .text-green-400 { color: var(--sp-accent) !important; }

    /* Stars in result screen */
    .text-yellow-400 { color: var(--sp-accent) !important; }
    .fill-yellow-400 { fill: var(--sp-accent) !important; }

    /* Medal colors in leaderboard — keep gold/silver/bronze feel */
    /* (text-yellow-400 already handled above for gold; silver & bronze keep their color) */

    /* Locked level buttons */
    .opacity-70 { opacity: 0.45 !important; }

    /* Global font override */
    * { font-family: 'Montserrat', sans-serif; }
    .font-title { font-family: 'Montserrat', sans-serif !important; font-weight: 900 !important; }

    /* Title glow → Spotify green */
    @keyframes titleFocus {
      0%   { transform: scale(1);   filter: none; }
      30%  { transform: scale(1.25); filter: drop-shadow(0 0 18px rgba(29,185,84,0.5)); }
      70%  { transform: scale(1.55); filter: drop-shadow(0 0 35px rgba(29,185,84,0.7)) drop-shadow(0 0 70px rgba(29,185,84,0.4)); }
      85%  { transform: scale(1.6);  filter: drop-shadow(0 0 45px rgba(29,185,84,0.85)); }
      100% { transform: scale(1.6);  filter: drop-shadow(0 0 45px rgba(29,185,84,0.85)); }
    }
    @keyframes titleReturn {
      from { transform: scale(1.6); filter: drop-shadow(0 0 45px rgba(29,185,84,0.75)); }
      to   { transform: scale(1);   filter: none; }
    }

  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wwBlue:     '#282828',   // dark surface (was blue)
            wwDarkBlue: '#121212',   // darkest bg/shadow (was dark blue)
            wwYellow:   '#1DB954',   // Spotify green accent (was yellow)
            wwRed:      '#ef4444',   // keep red for close/danger buttons
            wwWhite:    '#ffffff',
          }
        }
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>

  <!-- Global Audio Elements -->
  <audio id="bgm" src="assets/music/game_background 1.mp3" loop></audio>
  <audio id="bgm-2" src="assets/music/game_background 2.mp3" loop></audio>
  <audio id="sfx-click" src="assets/music/click 1.mp3"></audio>
  <audio id="sfx-timer" src="assets/music/timer.mp3"></audio>
  <audio id="sfx-correct" src="assets/music/correct answer.mp3"></audio>
  <audio id="sfx-wrong" src="assets/music/wrong answer.mp3"></audio>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Audio Helpers
    const playClick = () => {
      const sfx = document.getElementById('sfx-click');
      if (sfx) {
        sfx.currentTime = 0;
        sfx.play().catch(e => console.log('Audio play blocked:', e));
      }
    };

    const playTimerTick = () => {
      const sfx = document.getElementById('sfx-timer');
      if (sfx) { sfx.volume = 0.3; sfx.play().catch(e => e); }
    };

    const playCorrect = () => {
      const sfx = document.getElementById('sfx-correct');
      if (sfx) { sfx.currentTime = 0; sfx.volume = 0.4; sfx.play().catch(e => e); }
    };

    const playWrong = () => {
      const sfx = document.getElementById('sfx-wrong');
      if (sfx) { sfx.currentTime = 0; sfx.volume = 0.4; sfx.play().catch(e => e); }
    };

    const startBGM = (mode = 'menu') => {
      const bgm1 = document.getElementById('bgm');
      const bgm2 = document.getElementById('bgm-2');

      if (mode === 'game') {
        if (bgm1) bgm1.pause();
        if (bgm2) {
          bgm2.volume = 0.15;
          bgm2.play().catch(e => console.log('BGM2 blocked:', e));
        }
      } else {
        if (bgm2) bgm2.pause();
        if (bgm1) {
          bgm1.volume = 0.15;
          bgm1.play().catch(e => console.log('BGM1 blocked:', e));
        }
      }
    };

    // --- Web Speech API TTS Hook ---
    function useGermanVoice() {
      const [isSpeaking, setIsSpeaking] = useState(false);

      const speak = (text) => {
        if (!('speechSynthesis' in window)) return;
        
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'de-DE';
        utterance.rate = 0.85;
        utterance.pitch = 1.1;
        
        const voices = window.speechSynthesis.getVoices();
        const preferredNames = ['Google Deutsch', 'Microsoft Katja', 'Marlene', 'Anna'];
        
        let selectedVoice = null;
        for (const name of preferredNames) {
          selectedVoice = voices.find(v => v.name.includes(name) && v.lang.startsWith('de'));
          if (selectedVoice) break;
        }
        
        if (!selectedVoice) {
          selectedVoice = voices.find(v => v.lang.startsWith('de'));
        }
        
        if (selectedVoice) {
          utterance.voice = selectedVoice;
        }
        
        utterance.onstart = () => setIsSpeaking(true);
        utterance.onend = () => setIsSpeaking(false);
        utterance.onerror = () => setIsSpeaking(false);
        
        window.speechSynthesis.speak(utterance);
      };

      return { speak, isSpeaking };
    }

    // --- REUSABLE COMPONENTS ---

    // Icon Component using Lucide (Safe for React)
    function Icon({ name, size = 24, className = "" }) {
      const spanRef = useRef(null);

      useEffect(() => {
        if (window.lucide && spanRef.current) {
          spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          window.lucide.createIcons({
            attrs: { class: className, width: size, height: size },
            nameAttr: 'data-lucide',
            root: spanRef.current
          });
        }
      }, [name, className, size]);

      return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}"></i>` }} />;
    }

    // Wordwall Title Component
    function TitleText({ text1, text2, className = "" }) {
      return (
        <div className={`font-title text-center ${className}`}>
          {text1 && <h1 className="text-4xl sm:text-6xl text-white text-shadow-thick mb-2">{text1}</h1>}
          {text2 && <h1 className="text-5xl sm:text-7xl text-wwYellow text-shadow-thick">{text2}</h1>}
        </div>
      );
    }

    // Floating Background Decor
    function BackgroundDecor() {
      // Theme: Family / Home. Increased sizes.
      const items = [
        { icon: 'home', top: '5%', left: '8%', delay: '0s', size: 90 },
        { icon: 'armchair', top: '15%', right: '10%', delay: '1s', size: 80 },
        { icon: 'heart', top: '55%', left: '15%', delay: '2s', size: 70 },
        { icon: 'camera', bottom: '15%', right: '20%', delay: '0.5s', size: 85 },
        { icon: 'coffee', top: '65%', right: '8%', delay: '3s', size: 75 },
        { icon: 'utensils', bottom: '10%', left: '10%', delay: '1.5s', size: 90 },
      ];

      return (
        <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
          {items.map((item, i) => (
            <div
              key={i}
              className="float-decor drop-shadow-md"
              style={{ top: item.top, bottom: item.bottom, left: item.left, right: item.right, animationDelay: item.delay }}
            >
              <Icon name={item.icon} size={item.size} />
            </div>
          ))}
        </div>
      );
    }


    // --- LERNEN MODULE ---
    function LernenScreen({ onBack, onNavigate }) {
      const [tab, setTab] = useState(1);

      return (
        <div className="flex flex-col items-center min-h-screen p-4 sm:p-6 slide-up-fade-outer justify-center w-full relative">
          <BackgroundDecor />
          <div className="card-ww w-full max-w-4xl p-6 sm:p-8 mb-6 relative">
            <button onClick={() => { playClick(); onBack(); }} className="absolute top-4 right-4 bg-wwRed text-white rounded-full p-2 border-2 border-white shadow-[0_0_0_2px_#1e3a8a] z-20 hover:scale-105 active:scale-95 transition-transform">
              <Icon name="x" size={24} className="stroke-[3]" />
            </button>

            <div className="flex items-center justify-center mb-8">
              <h2 className="text-3xl sm:text-4xl font-title text-white text-shadow-thick">LERNEN</h2>
            </div>

            <div className="flex gap-4 mb-8 overflow-x-auto pb-4 px-2 sm:justify-center w-full max-w-full custom-scrollbar-hide snap-x">
              <button onClick={() => { playClick(); setTab(1); }} className={`flex-shrink-0 snap-center btn-ww px-6 py-3 text-sm sm:text-lg ${tab === 1 ? 'red' : ''}`}>
                Stammbaum
              </button>
              <button onClick={() => { playClick(); setTab(2); }} className={`flex-shrink-0 snap-center btn-ww px-6 py-3 text-sm sm:text-lg ${tab === 2 ? 'red' : ''}`}>
                Wortschatz
              </button>
              <button onClick={() => { playClick(); setTab(3); }} className={`flex-shrink-0 snap-center btn-ww px-6 py-3 text-sm sm:text-lg ${tab === 3 ? 'red' : ''}`}>
                Mini-Übung
              </button>
              {/* Spacer for right padding on scroll */}
              <div className="w-2 flex-shrink-0 sm:hidden"></div>
            </div>

            <div className="inner-box p-6 sm:p-8 min-h-[400px] pb-32 sm:pb-40 relative">
              {tab === 1 && <Stammbaum />}
              {tab === 2 && <Wortschatz />}
              {tab === 3 && <MiniUbung onNavigate={onNavigate} />}
            </div>
          </div>
        </div>
      );
    }

    // [Lernen Components: Stammbaum, Wortschatz, MiniUbung] - adapted to Wordwall colors
    function Stammbaum() {
      const [selectedChar, setSelectedChar] = useState(null);
      const [page, setPage] = useState(1);
      const { speak, isSpeaking } = useGermanVoice();

      const getRelationLabel = (char) => {
        if (!char) return '';
        if (char.id === 'ich') return 'ICH';
        const isFeminine = ['oma', 'mutter', 'schwester', 'tante', 'cousine', 'enkelin', 'nachbarin'].includes(char.id);
        const prefix = isFeminine ? 'MEINE ' : 'MEIN ';
        let name = char.title;
        if (char.id === 'opa') name = 'OPA';
        if (char.id === 'oma') name = 'OMA';
        return prefix + name.toUpperCase();
      };

      const getArticleNoun = (char) => {
        if (!char) return '';
        if (char.id === 'ich') return 'Das Kind';
        const article = char.color === 'bg-wwDarkBlue' ? 'Der' : (char.color === 'bg-wwRed' ? 'Die' : 'Das');
        const name = char.title.split(' / ')[0];
        return `${article} ${name}`;
      };

      const handleCharClick = (member) => {
        playClick();
        setSelectedChar(member);
        speak(getArticleNoun(member));
      };

      const coreFamily = [
        { id: 'opa', title: 'Großvater / Opa', img: 'assets/images/grossvater_opa.png', fallback: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=150&h=150&fit=crop', text: 'Das ist mein Großvater oder Opa. Er ist der Vater von meinem Vater.', color: 'bg-wwDarkBlue' },
        { id: 'oma', title: 'Großmutter / Oma', img: 'assets/images/grossmutter_oma.png', fallback: 'https://images.unsplash.com/photo-1566616213894-2d4e1baee5d8?w=150&h=150&fit=crop', text: 'Das ist meine Großmutter oder Oma. Sie ist die Mutter von meinem Vater.', color: 'bg-wwRed' },
        { id: 'vater', title: 'Vater', img: 'assets/images/vater.png', fallback: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=150&h=150&fit=crop', text: 'Das ist mein Vater. Er ist der Mann von meiner Mutter.', color: 'bg-wwDarkBlue' },
        { id: 'mutter', title: 'Mutter', img: 'assets/images/mutter.png', fallback: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150&h=150&fit=crop', text: 'Das ist meine Mutter. Sie ist die Frau von meinem Vater.', color: 'bg-wwRed' },
        { id: 'bruder', title: 'Bruder', img: 'assets/images/bruder.png', fallback: 'https://images.unsplash.com/photo-1544717305-2782549b5136?w=150&h=150&fit=crop', text: 'Das ist mein Bruder. Er ist der Sohn von meinen Eltern.', color: 'bg-wwDarkBlue' },
        { id: 'ich', title: 'Ich / Kind', img: 'assets/images/ich_kind.png', fallback: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150&h=150&fit=crop', text: 'Das bin ich! Ich bin das Kind von meinen Eltern.', color: 'bg-wwYellow' },
        { id: 'schwester', title: 'Schwester', img: 'assets/images/schwester.png', fallback: 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=150&h=150&fit=crop', text: 'Das ist meine Schwester. Sie ist die Tochter von meinen Eltern.', color: 'bg-wwRed' }
      ];

      const extendedFamily = [
        { id: 'onkel', title: 'Onkel', img: 'assets/images/onkel.png', fallback: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150&h=150&fit=crop', text: 'Das ist mein Onkel. Er ist der Bruder von meinem Vater oder meiner Mutter.', color: 'bg-wwDarkBlue' },
        { id: 'tante', title: 'Tante', img: 'assets/images/tante.png', fallback: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150&h=150&fit=crop', text: 'Das ist meine Tante. Sie ist die Schwester von meinem Vater oder meiner Mutter.', color: 'bg-wwRed' },
        { id: 'cousin', title: 'Cousin', img: 'assets/images/cousin.png', fallback: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=150&h=150&fit=crop', text: 'Das ist mein Cousin. Er ist der Sohn von meinem Onkel und meiner Tante.', color: 'bg-wwDarkBlue' },
        { id: 'cousine', title: 'Cousine', img: 'assets/images/cousine.png', fallback: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150&h=150&fit=crop', text: 'Das ist meine Cousine. Sie ist die Tochter von meinem Onkel und meiner Tante.', color: 'bg-wwRed' },
        { id: 'enkel', title: 'Enkel', img: 'assets/images/enkel.png', fallback: 'https://images.unsplash.com/photo-1519689680058-324335c77eba?w=150&h=150&fit=crop', text: 'Der Enkel ist der Sohn von einem Kind. Für meine Großeltern bin ich (oder mein Bruder) der Enkel.', color: 'bg-wwDarkBlue' },
        { id: 'enkelin', title: 'Enkelin', img: 'assets/images/enkelin.png', fallback: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150&h=150&fit=crop', text: 'Die Enkelin ist die Tochter von einem Kind. Für meine Großeltern bin ich (oder meine Schwester) die Enkelin.', color: 'bg-wwRed' },
        { id: 'sohn', title: 'Sohn', img: 'assets/images/sohn.png', fallback: 'https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?w=150&h=150&fit=crop', text: 'Der Sohn ist ein männliches Kind. Mein Bruder ist der Sohn von meinen Eltern.', color: 'bg-wwDarkBlue' },
        { id: 'tochter', title: 'Tochter', img: 'assets/images/tochter.png', fallback: 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=150&h=150&fit=crop', text: 'Die Tochter ist ein weibliches Kind. Meine Schwester ist die Tochter von meinen Eltern.', color: 'bg-wwRed' },
        { id: 'eltern', title: 'Eltern', img: 'assets/images/eltern.png', fallback: 'https://images.unsplash.com/photo-1511895426328-dc8714191300?w=150&h=150&fit=crop', text: 'Meine Eltern sind mein Vater und meine Mutter. Ich bin ihr Kind.', color: 'bg-wwYellow' },
        { id: 'grosseltern', title: 'Großeltern', img: 'assets/images/grosseltern.png', fallback: 'https://images.unsplash.com/photo-1519689680058-324335c77eba?w=150&h=150&fit=crop', text: 'Meine Großeltern sind mein Opa und meine Oma.', color: 'bg-wwYellow' },
        { id: 'geschwister', title: 'Geschwister', img: 'assets/images/geschwister.png', fallback: 'https://images.unsplash.com/photo-1511895426328-dc8714191300?w=150&h=150&fit=crop', text: 'Meine Geschwister sind mein Bruder und meine Schwester.', color: 'bg-wwYellow' }
      ];

      return (
        <div className="slide-up-fade-outer text-white relative">
          <div className="flex justify-center mb-4">
            <h3 className="font-title text-xl sm:text-2xl text-wwYellow drop-shadow-md text-center">
              {page === 1 ? 'KELUARGA INTI (Kernfamilie)' : 'KELUARGA BESAR & SOSIAL'}
            </h3>
          </div>

          {page === 1 ? (
            <div className="flex flex-col items-center gap-6 py-4 slide-up-fade">
              <div className="flex gap-8 justify-center relative">
                <div className="absolute top-1/2 left-[20%] right-[20%] h-1.5 bg-white/50 -z-10 rounded-full"></div>
                {[coreFamily[0], coreFamily[1]].map(member => (
                  <CharacterCard key={member.id} member={member} onClick={() => handleCharClick(member)} />
                ))}
              </div>
              <div className="h-6 w-1.5 bg-white/50 -my-4 z-0 rounded-full"></div>
              <div className="flex gap-8 justify-center relative">
                <div className="absolute top-1/2 left-[20%] right-[20%] h-1.5 bg-white/50 -z-10 rounded-full"></div>
                {[coreFamily[2], coreFamily[3]].map(member => (
                  <CharacterCard key={member.id} member={member} onClick={() => handleCharClick(member)} />
                ))}
              </div>
              <div className="h-6 w-1.5 bg-white/50 -my-4 z-0 rounded-full"></div>
              <div className="flex gap-4 justify-center relative">
                <div className="absolute top-1/2 left-[15%] right-[15%] h-1.5 bg-white/50 -z-10 rounded-full"></div>
                {[coreFamily[4], coreFamily[5], coreFamily[6]].map(member => (
                  <CharacterCard key={member.id} member={member} onClick={() => handleCharClick(member)} />
                ))}
              </div>
            </div>
          ) : (
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 sm:gap-6 py-4 slide-up-fade">
              {extendedFamily.map(member => (
                <CharacterCard key={member.id} member={member} onClick={() => handleCharClick(member)} />
              ))}
            </div>
          )}

          {/* Pagination Navigation */}
          <div className="flex justify-between mt-6 relative h-12">
            {page === 2 && (
              <button onClick={() => { playClick(); setPage(1); setSelectedChar(null); }} className="absolute left-0 flex items-center justify-center gap-2 bg-wwDarkBlue text-white font-bold py-2 px-4 sm:px-6 rounded-full border-2 border-white hover:bg-wwBlue transition-colors z-10 text-sm sm:text-base">
                <Icon name="arrow-left" size={20} /> INTI
              </button>
            )}
            {page === 1 && (
              <button onClick={() => { playClick(); setPage(2); setSelectedChar(null); }} className="absolute right-0 flex items-center justify-center gap-2 bg-wwDarkBlue text-white font-bold py-2 px-4 sm:px-6 rounded-full border-2 border-white hover:bg-wwBlue transition-colors z-10 text-sm sm:text-base">
                BESAR <Icon name="arrow-right" size={20} />
              </button>
            )}
          </div>

          {selectedChar && (
            <>
              {/* Blur backdrop — gradasi dari bawah ke atas */}
              <div className="dialog-backdrop" />
              <div className="dialog-sheet-wrap slide-up-fade">
              <div className="dialog-sheet-inner">
                <div className="dialog-panel">

                  {/* Close Button — 44×44px touch target */}
                  <button
                    onClick={() => { playClick(); setSelectedChar(null); }}
                    className="absolute top-3 right-3 sm:top-4 sm:right-4 bg-wwRed text-white rounded-full border-[3px] border-white shadow-md z-30 hover:scale-110 active:scale-95 transition-transform touch-target"
                  >
                    <Icon name="x" size={20} className="stroke-[3]" />
                  </button>

                  {/* Speech Bubble — responsive position & size */}
                  <div className="speech-bubble-anchor drop-shadow-md">
                    <div className="speech-bubble-label">
                      {getRelationLabel(selectedChar)}
                      <button
                        onClick={(e) => { e.stopPropagation(); speak(getArticleNoun(selectedChar)); }}
                        className={`touch-target cursor-pointer hover:scale-110 transition-transform ${isSpeaking ? 'animate-pulse text-wwRed' : 'text-wwDarkBlue'}`}
                      >
                        <Icon name="volume-2" size={18} />
                      </button>
                    </div>
                    {/* Tail border */}
                    <div className="absolute -bottom-[5px] left-[14px] w-4 h-4 bg-white rotate-45 z-10"></div>
                    {/* Tail fill */}
                    <div className="absolute -bottom-[2px] left-[14px] w-4 h-4 bg-wwYellow rotate-45 z-30"></div>
                  </div>

                  {/* Character Portrait — responsive, no distortion */}
                  <div className="dialog-portrait-wrap">
                    <img
                      src="assets/images/dialog_alanna.png"
                      alt="Ich"

    function WortsalatScreen({ level, onFinish, onBack }) {
      const [questions, setQuestions] = useState([]);
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [correctCount, setCorrectCount] = useState(0); // jumlah soal benar (untuk pass/fail)
      const [score, setScore] = useState(0);               // poin (10 per soal, -1 per hint)
      const [shuffledLetters, setShuffledLetters] = useState([]);
      const [placedLetters, setPlacedLetters] = useState([]);
      const [timeLeft, setTimeLeft] = useState(45);
      const [mistakes, setMistakes] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [timerActive, setTimerActive] = useState(false);
      const timerActiveRef = useRef(false); // ref untuk hindari stale closure
      const scoreRef = useRef(0);           // ref untuk nilai score terkini
      const correctCountRef = useRef(0);    // ref untuk correctCount terkini
      const { speak } = useGermanVoice();

      // Sync ref setiap kali state berubah
      useEffect(() => { timerActiveRef.current = timerActive; }, [timerActive]);
      useEffect(() => { scoreRef.current = score; }, [score]);
      useEffect(() => { correctCountRef.current = correctCount; }, [correctCount]);

      useEffect(() => {
        let qList = [...wordBank].sort(() => 0.5 - Math.random());
        const prepared = qList.map(w => {
          let target = ""; let clue = ""; let clueType = "";
          if (level === 1) {
            target = w.noun; clue = w.img; clueType = "image";
          } else if (level === 2) {
            target = w.noun; clue = w.clue; clueType = "text";
          } else if (level === 3) {
            target = w.article + " " + w.noun;
            clue = w.img;
            clueType = "image";
          }
          return { ...w, target, clue, clueType };
        });
        setQuestions(prepared);
      }, [level]);

      useEffect(() => {
        if (questions.length > 0 && currentQIndex < questions.length) {
          const q = questions[currentQIndex];
          const targetStr = q.target.replace(/ /g, '');
          const shuffled = targetStr.split('').sort(() => 0.5 - Math.random()).map((char, i) => ({ id: `char_${currentQIndex}_${i}`, char }));
          setShuffledLetters(shuffled);
          setPlacedLetters(Array(q.target.length).fill(null));
          setTimeLeft(45);
          setMistakes(0);
          setFeedback(null);
          setTimerActive(true);

          if (level === 2 && q.clueType === 'text') {
            speak(q.clue);
          }
        } else if (questions.length > 0 && currentQIndex >= questions.length) {
          // Kirim: jumlah benar, total soal, total poin aktual
          onFinish(correctCountRef.current, questions.length, scoreRef.current);
        }
      }, [currentQIndex, questions]);

      useEffect(() => {
        if (!timerActive) return;
        if (timeLeft <= 0) {
          setTimerActive(false);
          playWrong();
          setFeedback({ text: "Waktu Habis!", type: 'error' });
          setTimeout(() => setCurrentQIndex(i => i + 1), 1500);
          return;
        }
        if (timeLeft === 10) {
          playTimerTick();
        }
        const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
        return () => clearInterval(timer);
      }, [timeLeft, timerActive]);

      const handleHint = () => {
        playClick();
        const q = questions[currentQIndex];
        const emptyIdx = placedLetters.findIndex((pl, i) => pl === null && q.target[i] !== ' ');
        if (emptyIdx !== -1) {
          const correctChar = q.target[emptyIdx];
          const letterInShuffleIndex = shuffledLetters.findIndex(l => l.char === correctChar);
          if (letterInShuffleIndex !== -1) {
            const letterObj = shuffledLetters[letterInShuffleIndex];
            // Terapkan penalti -1 poin (minimum 0)
            setScore(s => Math.max(0, s - 1));
            handleLetterClick(letterObj, true);
          }
        }
      };

      // Klik huruf di slot → undo (kembalikan ke pool)
      const handleSlotClick = (slotIndex) => {
        if (!timerActiveRef.current) return;
        const pl = placedLetters[slotIndex];
        if (!pl) return;
        playClick();
        setShuffledLetters(s => [...s, { id: pl.id, char: pl.char }]);
        const newPlaced = [...placedLetters];
        newPlaced[slotIndex] = null;
        setPlacedLetters(newPlaced);
        setFeedback(null);
      };

      const handleLetterClick = (letterObj, isHint = false) => {
        if (!timerActiveRef.current) return;
        if (!isHint) playClick();

        const q = questions[currentQIndex];
        const emptyIdx = placedLetters.findIndex((pl, i) => pl === null && q.target[i] !== ' ');

        if (emptyIdx !== -1) {
          const expectedChar = q.target[emptyIdx];

          if (letterObj.char === expectedChar) {
            const newPlaced = [...placedLetters];
            newPlaced[emptyIdx] = { ...letterObj, status: 'correct' };
            setPlacedLetters(newPlaced);
            setShuffledLetters(s => s.filter(sl => sl.id !== letterObj.id));

            const totalChars = q.target.replace(/ /g, '').length;
            if (newPlaced.filter(p => p !== null).length === totalChars) {
              setTimerActive(false);
              setCorrectCount(c => c + 1);   // hitung soal benar (untuk pass/fail)
              setScore(s => s + 10);          // +10 poin per soal benar
              playCorrect();
              setFeedback({ text: ["Prima!", "Richtig!", "Gut gemacht!"][Math.floor(Math.random() * 3)], type: 'success' });
              setTimeout(() => speak(`${q.article} ${q.noun.split(' / ')[0]}`), 300);
              setTimeout(() => setCurrentQIndex(i => i + 1), 2000);
            }
          } else {
            // Salah: taruh di slot dengan warna merah, tambah kesalahan
            setMistakes(m => m + 1);
            playWrong();
            setFeedback({ text: "Ups, versuch es nochmal!", type: 'error' });
            setTimeout(() => setFeedback(null), 1500);

            const newPlaced = [...placedLetters];
            newPlaced[emptyIdx] = { ...letterObj, status: 'wrong' };
            setPlacedLetters(newPlaced);
            setShuffledLetters(s => s.filter(sl => sl.id !== letterObj.id));
            // Tidak ada auto-revert — pemain harus klik slot merah untuk undo
          }
        }
      };

      if (questions.length === 0 || currentQIndex >= questions.length) return null;
      const q = questions[currentQIndex];

      return (
        <div className="flex flex-col items-center min-h-screen p-4 justify-center w-full relative">
          <BackgroundDecor />
          <div className="card-ww w-full max-w-2xl p-6 sm:p-10 relative z-10">
            <button onClick={() => { playClick(); onBack(); }} className="absolute top-4 right-4 bg-wwRed text-white rounded-full p-2 border-2 border-white shadow-[0_0_0_2px_#1e3a8a] z-20 hover:scale-105 active:scale-95 transition-transform">
              <Icon name="x" size={24} />
            </button>

            <TitleText text1="WORTSALAT" className="mb-2 scale-75 sm:scale-100" />
            <div className="text-center font-title text-white mb-6 bg-black/20 rounded-full px-4 py-1 mx-auto w-max border-2 border-white/40">
              Tahap {level} • Soal {currentQIndex + 1}/20
            </div>

            <div className="flex justify-between text-white font-title text-lg sm:text-xl mb-6 bg-wwDarkBlue px-6 py-2 rounded-full border-2 border-white">
              <span className={timeLeft <= 10 ? "text-wwRed animate-pulse" : ""}>Time: {timeLeft}s</span>
              <span className="text-wwYellow">Score: {score}</span>
            </div>

            <div className="inner-box p-6 flex flex-col items-center mb-6 min-h-[250px] justify-center relative">
              {/* Feedback Overlay */}
              {feedback && (
                <div className={`absolute -top-6 sm:-top-8 left-1/2 -translate-x-1/2 z-30 font-title text-sm sm:text-base px-4 py-2 rounded-full flex items-center gap-2 whitespace-nowrap animate-pop-in ${feedback.type === 'success' ? 'bg-[#1DB954] text-black shadow-[0_4px_20px_rgba(34,197,94,0.4)]' : 'bg-[#ef4444] text-white shadow-[0_4px_20px_rgba(239,68,68,0.4)]'}`}>
                  <Icon name={feedback.type === 'success' ? 'check-circle' : 'x-circle'} size={20} />
                  {feedback.text}
                </div>
              )}

              {/* Clue */}
              {q.clueType === 'image' ? (
                <img src={q.clue} onError={(e) => { e.target.src = q.fallback; }} className="w-32 h-32 rounded-2xl border-4 border-white mb-6 object-cover shadow-lg" />
              ) : (
                <p className="font-bold text-xl sm:text-2xl text-wwYellow mb-6 text-center leading-relaxed">"{q.clue}"</p>
              )}

              {/* Slots */}
              <div className="flex gap-1 sm:gap-2 mb-6 flex-wrap justify-center">
                {q.target.split('').map((char, i) => {
                  if (char === ' ') return <div key={i} className="w-4 sm:w-6"></div>;
                  const pl = placedLetters[i];
                  let slotColor = "bg-white/20";
                  let animation = "";
                  let cursor = "";
                  if (pl) {
                    if (pl.status === 'correct') { slotColor = "bg-green-500"; cursor = "cursor-pointer"; }
                    if (pl.status === 'wrong')   { slotColor = "bg-wwRed"; animation = "animate-pulse"; cursor = "cursor-pointer"; }
                  }

                  return (
                    <div
                      key={i}
                      onClick={() => handleSlotClick(i)}
                      title={pl ? "Klik untuk undo" : ""}
                      className={`w-10 h-10 sm:w-12 sm:h-12 border-4 border-white rounded-xl flex items-center justify-center font-title text-xl sm:text-2xl text-white shadow-inner transition-all select-none ${slotColor} ${animation} ${cursor}`}
                    >
                      {pl ? pl.char : ''}
                    </div>
                  );
                })}
              </div>

              {/* Letters Pool */}
              <div className="flex flex-wrap justify-center gap-2">
                {shuffledLetters.map((l) => (
                  <button key={l.id} disabled={!timerActive} onClick={() => handleLetterClick(l)} className="w-12 h-12 sm:w-14 sm:h-14 bg-wwDarkBlue border-4 border-white text-white rounded-xl font-title text-2xl shadow-[0_4px_0_0_#1e3a8a] hover:bg-wwBlue hover:-translate-y-1 active:translate-y-1 active:shadow-none transition-all disabled:opacity-50">
                    {l.char}
                  </button>
                ))}
              </div>
            </div>

            {/* Hint System */}
            <div className="flex justify-center h-12">
              {mistakes >= 3 && shuffledLetters.length > 0 && timerActive && (
                <button onClick={handleHint} className="btn-ww px-6 py-2 flex items-center gap-2 bg-wwYellow text-wwDarkBlue hover:bg-yellow-400">
                  <Icon name="lightbulb" size={20} /> Bantuan
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function LevelResultScreen({ score, total, points, onRetry, onNextLevel, onMenu }) {
      const percentage = (score / total) * 100;
      const passed = percentage >= 50;

      let stars = 0;
      if (percentage >= 90) stars = 3;
      else if (percentage >= 70) stars = 2;
      else if (percentage >= 50) stars = 1;

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-blob relative p-4 slide-up-fade">
          <BackgroundDecor />
          <div className="card-ww max-w-md w-full p-8 relative text-center z-10">
            <h2 className="font-title text-4xl text-white text-shadow-thick mb-6">
              {passed ? "GESCHAFFT!" : "SCHADE!"}
            </h2>

            <div className="flex justify-center gap-2 mb-6">
              {[1, 2, 3].map(s => (
                <Icon key={s} name="star" size={60} className={s <= stars ? "text-wwYellow fill-wwYellow drop-shadow-lg" : "text-gray-400 fill-gray-400"} />
              ))}
            </div>

            <div className="inner-box p-6 mb-8 text-center">
              {/* Poin yang diperoleh */}
              <p className="font-bold text-sm text-white/70 uppercase tracking-widest mb-1">Poin Diperoleh</p>
              <h3 className="text-5xl font-title text-wwYellow drop-shadow-md mb-3">{points ?? 0}</h3>
              {/* Jawaban benar */}
              <div className="flex items-center justify-center gap-2 mb-3">
                <Icon name="check-circle" size={20} className="text-green-400" />
                <span className="font-bold text-white text-lg">{score} / {total} jawaban benar</span>
              </div>
              <p className="font-bold text-white/80 text-sm">
                {passed ? "Bagus! Kamu bisa lanjut ke tahap berikutnya." : "Versuch es noch einmal! (Coba lagi!)"}
              </p>
            </div>

            <div className="flex flex-col gap-4">
              {passed ? (
                <button onClick={() => { playClick(); onNextLevel(); }} className="btn-ww red w-full py-4 text-xl">
                  TAHAP BERIKUTNYA
                </button>
              ) : (
                <button onClick={() => { playClick(); onRetry(); }} className="btn-ww red w-full py-4 text-xl">
                  ULANGI TAHAP INI
                </button>
              )}
              <button onClick={() => { playClick(); onMenu(); }} className="w-full bg-wwDarkBlue text-white font-bold py-3 rounded-full border-2 border-white hover:bg-wwBlue">
                KEMBALI KE MENU
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- SCREENS ---
    // --- WAVE DECORATION (Splash Screen background) ---
    function WaveDecor() {
      return (
        <div className="absolute inset-0 pointer-events-none overflow-hidden z-0">
          {/* Wave layer 1 — slowest, most transparent */}
          <div style={{ position: 'absolute', bottom: 0, left: 0, width: '100%', height: '220px', overflow: 'hidden' }}>
            <svg viewBox="0 0 1440 220" preserveAspectRatio="none"
              style={{ width: '200%', height: '100%', animation: 'waveMove 14s linear infinite' }}>
              <path d="M0,110 C180,160 360,60 540,110 C720,160 900,60 1080,110 C1260,160 1440,60 1440,110 L1440,220 L0,220 Z"
                fill="rgba(255,255,255,0.08)" />
            </svg>
          </div>
          {/* Wave layer 2 — medium speed */}
          <div style={{ position: 'absolute', bottom: 0, left: 0, width: '100%', height: '180px', overflow: 'hidden' }}>
            <svg viewBox="0 0 1440 180" preserveAspectRatio="none"
              style={{ width: '200%', height: '100%', animation: 'waveMove 10s linear infinite reverse' }}>
              <path d="M0,90 C200,140 400,40 600,90 C800,140 1000,40 1200,90 C1300,115 1380,70 1440,90 L1440,180 L0,180 Z"
                fill="rgba(255,255,255,0.10)" />
            </svg>
          </div>
          {/* Wave layer 3 — fastest, most opaque */}
          <div style={{ position: 'absolute', bottom: 0, left: 0, width: '100%', height: '130px', overflow: 'hidden' }}>
            <svg viewBox="0 0 1440 130" preserveAspectRatio="none"
              style={{ width: '200%', height: '100%', animation: 'waveMove 7s linear infinite' }}>
              <path d="M0,65 C160,100 320,30 480,65 C640,100 800,30 960,65 C1120,100 1280,30 1440,65 L1440,130 L0,130 Z"
                fill="rgba(255,255,255,0.14)" />
            </svg>
          </div>
          {/* Large rotating blob top-right */}
          <div style={{ position: 'absolute', top: '-40%', right: '-20%', width: '70vw', height: '70vw', background: 'rgba(30,58,138,0.22)', borderRadius: '40%', animation: 'rotateBlob 35s linear infinite' }} />
          {/* Large rotating blob bottom-left */}
          <div style={{ position: 'absolute', bottom: '-40%', left: '-20%', width: '60vw', height: '60vw', background: 'rgba(30,58,138,0.18)', borderRadius: '40%', animation: 'rotateBlob 50s linear infinite reverse' }} />
        </div>
      );
    }

    // --- SPLASH AUTH SCREEN (Splash + Preloader + Auth integrated) ---
    const SA_IMAGES = [
      'assets/images/grossvater_opa.png','assets/images/grossmutter_oma.png',
      'assets/images/vater.png','assets/images/mutter.png',
      'assets/images/bruder.png','assets/images/ich_kind.png',
      'assets/images/schwester.png','assets/images/onkel.png',
      'assets/images/tante.png','assets/images/cousin.png',
      'assets/images/cousine.png','assets/images/enkel.png',
      'assets/images/enkelin.png','assets/images/nachbar.png',
      'assets/images/nachbarin.png','assets/images/Profil_Pengembang.gif',
    ];
    const SA_AUDIO = [
      'assets/music/game_background 1.mp3','assets/music/game_background 2.mp3',
      'assets/music/click 1.mp3','assets/music/timer.mp3',
      'assets/music/correct answer.mp3','assets/music/wrong answer.mp3',
    ];

    function SplashAuthScreen({ onComplete }) {
      const returning = !!localStorage.getItem('namaPemain');
      // phases: idle → btn-exit → centering → loading → rising → auth
      const [phase, setPhase]       = useState('idle');
      const [progress, setProgress] = useState(0);
      const [loadMsg, setLoadMsg]   = useState('Memuat aset...');
      const [progressDone, setProgressDone] = useState(false);
      const [progressTop, setProgressTop]   = useState('80%'); // posisi dinamis, diukur saat runtime
      const titleRef = useRef(null); // ref untuk mengukur ukuran judul setelah diperbesar

      // Auth state
      const [authView, setAuthView] = useState('login');
      const [email, setEmail]   = useState('');
      const [nama, setNama]     = useState('');
      const [sandi, setSandi]   = useState('');
      const [authErr, setAuthErr] = useState('');
      const [authInfo, setAuthInfo] = useState('');
      const [authLoad, setAuthLoad] = useState(false);
      const [showPassword, setShowPassword] = useState(false);
      const [welcomeUser, setWelcomeUser] = useState(null);

      const delay = ms => new Promise(r => setTimeout(r, ms));

      const runPreloader = () => new Promise(resolve => {
        const all = [...SA_IMAGES, ...SA_AUDIO];
        const total = all.length;
        let loaded = 0;
        const tick = () => {
          loaded++;
          const pct = Math.round((loaded / total) * 100);
          setProgress(pct);
          if (pct < 40)       setLoadMsg('Memuat gambar karakter...');
          else if (pct < 80)  setLoadMsg('Memuat audio...');
          else if (pct < 100) setLoadMsg('Menyelesaikan...');
          else { setLoadMsg('Siap! ✓'); resolve(); }
        };
        SA_IMAGES.forEach(src => { const i=new Image(); i.onload=i.onerror=tick; i.src=src; });
        SA_AUDIO.forEach(src  => { const a=new Audio(); a.oncanplaythrough=a.onerror=tick; a.src=src; a.load(); });
      });

      const handleStart = async () => {
        if (phase !== 'idle') return;
        playClick();
        setPhase('btn-exit');
        await delay(350);
        setPhase('centering');       // judul bergerak ke tengah
        await delay(850);            // tunggu CSS transition + titleFocus selesai

        // ── Ukur posisi bawah judul (setelah diperbesar 1.6x) secara dinamis ──
        if (titleRef.current) {
          const rect = titleRef.current.getBoundingClientRect();
          const titleBottomPct = (rect.bottom / window.innerHeight) * 100;
          // Tengah antara bawah judul & batas layar, dengan padding minimum 8%
          const mid = titleBottomPct + (100 - titleBottomPct) / 2;
          setProgressTop(`${Math.min(mid, 88)}%`);
        }

        setPhase('loading');         // progress bar muncul
        await runPreloader();
        await delay(500);            // tahan 100% sebentar
        setProgressDone(true);       // progress fade out
        await delay(400);
        setPhase('rising');          // judul naik ke atas
        await delay(850);
        if (returning) {
          startBGM();
          onComplete(localStorage.getItem('namaPemain'));
        } else {
          setPhase('auth');          // auth muncul
        }
      };

      // Posisi vertikal judul berdasarkan fase
      const titleTop = (phase==='idle'||phase==='btn-exit') ? '38%'
                      : (phase==='centering'||phase==='loading') ? '44%'
                      : '7%';

      // Auth handlers
      const gasPost = async (payload) => {
        const r = await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain;charset=utf-8'}});
        return r.json();
      };
      const switchAuth = v => { setAuthView(v); setEmail(''); setNama(''); setSandi(''); setAuthErr(''); setAuthInfo(''); };

      const handleLogin = async (e) => {
        e.preventDefault(); setAuthErr(''); setAuthInfo('');
        if(!email||!sandi){setAuthErr('Email dan kata sandi wajib diisi.');return;}
        playClick(); setAuthLoad(true);
        try {
          const d = await gasPost({action:'login',email:email.trim(),sandi});
          if(d.status==='sukses'){
            localStorage.setItem('namaPemain',d.nama);
            localStorage.setItem('emailPemain',email.trim());
            startBGM(); onComplete(d.nama);
          } else { setAuthErr((d.pesan || 'Email tidak ditemukan atau kata sandi salah.') + " Silakan buat akun baru!"); }
        } catch { setAuthErr('Gagal terhubung. Cek koneksi internet.'); }
        finally { setAuthLoad(false); }
      };

      const handleRegister = async (e) => {
        e.preventDefault(); setAuthErr(''); setAuthInfo('');
        if(!email||!nama||!sandi){setAuthErr('Semua kolom wajib diisi.');return;}
        if(sandi.length<6){setAuthErr('Kata sandi minimal 6 karakter.');return;}
        playClick(); setAuthLoad(true);
        try {
          const d = await gasPost({action:'register',email:email.trim(),nama:nama.trim(),sandi});
          if(d.status==='sukses'){ setWelcomeUser(nama.trim()); }
          else { setAuthErr(d.pesan||'Pendaftaran gagal.'); }
        } catch { setAuthErr('Gagal terhubung. Cek koneksi internet.'); }
        finally { setAuthLoad(false); }
      };

      const inp = "w-full p-3 rounded-xl text-wwDarkBlue font-bold text-base border-4 border-white focus:outline-none focus:border-wwYellow disabled:opacity-50 transition-colors";
      const lbl = "block text-white font-bold mb-1 text-sm uppercase tracking-wide";

      return (
        <div className="min-h-screen bg-blob relative overflow-hidden slide-up-fade spotify-splash"
          style={{pointerEvents: phase==='btn-exit'||phase==='centering'||phase==='rising' ? 'none':'auto', backgroundColor:'#121212'}}>
          <WaveDecor />
          <BackgroundDecor />

          {/* ── JUDUL (bergerak vertikal) ── */}
          <div ref={titleRef} className="sa-title-wrap" style={{top: titleTop}}>
            <div className={`drop-shadow-2xl ${
              phase==='idle'||phase==='btn-exit'         ? 'animate-breathe'
              : phase==='centering'||phase==='loading'   ? 'title-focused'
              : phase==='rising'                         ? 'title-returning'
              : ''
            }`}>
              <TitleText text1="WORTSALAT" text2="FAMILIE" className="scale-90 sm:scale-100" />
            </div>
          </div>

          {/* ── TOMBOL ANFANGEN ── */}
          <div className="absolute inset-0 flex flex-col items-center justify-center z-20" style={{top:'120px'}}>
            {phase==='idle' && (
              <button onClick={handleStart}
                className="btn-anfangen btn-ww red px-12 py-4 text-2xl sm:text-3xl tracking-widest hover:scale-105 active:scale-95 transition-transform drop-shadow-lg mt-32">
                ANFANGEN
              </button>
            )}
            {phase==='btn-exit' && (
              <button disabled className="btn-anfangen btn-ww red px-12 py-4 text-2xl sm:text-3xl tracking-widest drop-shadow-lg btn-exiting mt-32">
                ANFANGEN
              </button>
            )}
          </div>

          {/* ── PROGRESS BAR — posisi dinamis: tengah antara judul & bawah layar ── */}
          {(phase==='loading'||phase==='rising') && (
            <div className={`absolute left-1/2 z-20 w-full max-w-sm px-8 ${progressDone?'sa-fade-out':'sa-fade-in'}`}
              style={{top: progressTop, transform:'translate(-50%, -50%)'}}>
              <p className="text-white font-bold text-center mb-3 text-sm tracking-wide">{loadMsg}</p>
              <div className="sa-progress-track mb-2">
                <div className="sa-progress-fill" style={{width:`${progress}%`}} />
              </div>
              <p className="text-white/70 text-center text-xs font-bold">{progress}%</p>
            </div>
          )}

          {/* ── AUTH FORM (muncul setelah judul naik) ── */}
          {phase==='auth' && (
            <div className="absolute left-0 right-0 z-20 w-full max-w-md mx-auto px-4 sa-auth-in"
              style={{top:'22%'}}>
              <div className="card-ww p-7">
                {/* Header */}
                <div className="flex flex-col items-center mb-5">
                  <Icon name="shield-check" size={40} className="text-wwYellow drop-shadow-lg mb-2" />
                  <h2 className="font-title text-2xl text-center text-white text-shadow-thick">
                    {authView==='login'?'MENU MASUK':'MENU DAFTAR'}
                  </h2>
                </div>

                {/* Pesan */}
                {authErr && <div className="bg-wwRed/90 text-white text-sm font-bold px-4 py-2 rounded-xl border-2 border-white mb-3 flex items-center gap-2" style={{ fontSize: 'clamp(11.5px, 3vw, 14px)' }}><Icon name="alert-circle" size={16}/>{authErr}</div>}
                {authInfo && <div className="bg-green-500/90 text-white text-sm font-bold px-4 py-2 rounded-xl border-2 border-white mb-3 flex items-center gap-2"><Icon name="check-circle" size={16}/>{authInfo}</div>}

                {authView==='login' ? (
                  <form onSubmit={handleLogin} className="space-y-3">
                    <div className="inner-box p-4 space-y-3">
                      <div><label className={lbl}>Email</label>
                        <input id="sa-email" type="email" value={email} onChange={e=>setEmail(e.target.value)} required disabled={authLoad} className={inp} placeholder="contoh@email.com" autoComplete="email"/></div>
                      <div><label className={lbl}>Kata Sandi</label>
                        <div className="relative">
                          <input id="sa-pass" type={showPassword ? "text" : "password"} value={sandi} onChange={e=>setSandi(e.target.value)} required disabled={authLoad} className={`${inp} pr-12`} placeholder="••••••" autoComplete="current-password"/>
                          <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 flex items-center pr-4 text-white/50 hover:text-white transition-colors"><Icon name={showPassword ? "eye-off" : "eye"} size={22}/></button>
                        </div>
                      </div>
                    </div>
                    <button id="btn-masuk" type="submit" disabled={authLoad} className="btn-ww red w-full py-3 text-xl flex justify-center items-center gap-2">
                      {authLoad?<Icon name="loader-2" className="animate-spin" size={22}/>:<Icon name="log-in" size={22}/>}
                      {authLoad?'MEMUAT...':'MASUK'}
                    </button>
                    <p className="text-center text-white/80 text-sm">Belum punya akun?{' '}
                      <button type="button" onClick={()=>switchAuth('register')} className="text-wwYellow font-bold underline hover:text-yellow-300">Buat akun baru</button>
                    </p>
                  </form>
                ) : (
                  <form onSubmit={handleRegister} className="space-y-3">
                    <div className="inner-box p-4 space-y-3">
                      <div><label className={lbl}>Email</label>
                        <input id="sa-reg-email" type="email" value={email} onChange={e=>setEmail(e.target.value)} required disabled={authLoad} className={inp} placeholder="contoh@email.com" autoComplete="email"/></div>
                      <div><label className={lbl}>Nama Pemain</label>
                        <input id="sa-reg-nama" type="text" value={nama} onChange={e=>setNama(e.target.value)} required disabled={authLoad} className={inp} placeholder="Nama di ranking" autoComplete="username"/></div>
                      <div><label className={lbl}>Kata Sandi <span className="text-white/60 normal-case font-normal">(minimal 6 karakter)</span></label>
                        <div className="relative">
                          <input id="sa-reg-pass" type={showPassword ? "text" : "password"} value={sandi} onChange={e=>setSandi(e.target.value)} required minLength={6} disabled={authLoad} className={`${inp} pr-12`} placeholder="••••••" autoComplete="new-password"/>
                          <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 flex items-center pr-4 text-white/50 hover:text-white transition-colors"><Icon name={showPassword ? "eye-off" : "eye"} size={22}/></button>
                        </div>
                      </div>
                    </div>
                    <button id="btn-daftar" type="submit" disabled={authLoad} className="btn-ww red w-full py-3 text-xl flex justify-center items-center gap-2">
                      {authLoad?<Icon name="loader-2" className="animate-spin" size={22}/>:<Icon name="user-plus" size={22}/>}
                      {authLoad?'MEMUAT...':'DAFTAR'}
                    </button>
                    <p className="text-center text-white/80 text-sm">Sudah punya akun?{' '}
                      <button type="button" onClick={()=>switchAuth('login')} className="text-wwYellow font-bold underline hover:text-yellow-300">Masuk di sini</button>
                    </p>
                  </form>
                )}
              </div>
            </div>
